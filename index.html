<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0F1923">
<title>Bonjour Nawel !</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0F1923; --surface: #1C2B38; --surface2: #243545;
    --gold: #E8A838; --gold-light: #F5C96A;
    --text: #F0EDE6; --text-dim: #8FA3B0;
    --radius: 20px;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow-x: hidden; }
  .app { max-width: 430px; margin: 0 auto; min-height: 100dvh; display: flex; flex-direction: column; }

  header { padding: 20px 20px 0; display: flex; align-items: center; justify-content: space-between; }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon { font-size: 26px; }
  .logo-text { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--gold); letter-spacing: 0.02em; }

  .tabs { display: flex; gap: 8px; padding: 16px 20px 0; }
  .tab { flex: 1; padding: 10px 4px; background: var(--surface); border: none; border-radius: 12px; color: var(--text-dim); font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; -webkit-tap-highlight-color: transparent; }
  .tab.active { background: var(--gold); color: #0F1923; }

  .search-wrap { padding: 16px 20px 0; }
  .search-row { display: flex; gap: 8px; }
  .search-input { flex: 1; background: var(--surface); border: 1.5px solid transparent; border-radius: 14px; padding: 12px 16px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 15px; outline: none; transition: border-color 0.2s; }
  .search-input::placeholder { color: var(--text-dim); }
  .search-input:focus { border-color: var(--gold); }
  .search-btn { background: var(--gold); border: none; border-radius: 14px; padding: 0 18px; color: #0F1923; font-size: 18px; cursor: pointer; font-weight: 600; -webkit-tap-highlight-color: transparent; }
  .search-btn:active { background: var(--gold-light); }
  .search-hint { font-size: 12px; color: var(--text-dim); margin-top: 6px; padding-left: 4px; }

  .filter-row { display: flex; gap: 8px; overflow-x: auto; padding: 12px 20px 0; scrollbar-width: none; }
  .filter-row::-webkit-scrollbar { display: none; }
  .chip { flex-shrink: 0; background: var(--surface); border: 1.5px solid transparent; border-radius: 20px; padding: 7px 14px; font-size: 13px; font-weight: 500; color: var(--text-dim); cursor: pointer; transition: all 0.2s; -webkit-tap-highlight-color: transparent; }
  .chip.active { background: rgba(232,168,56,0.15); border-color: var(--gold); color: var(--gold); }

  .main { flex: 1; overflow-y: auto; padding: 20px 20px 100px; -webkit-overflow-scrolling: touch; }
  .screen { display: none; }
  .screen.active { display: block; }

  .date-pill { display: inline-flex; align-items: center; gap: 6px; background: var(--surface); border-radius: 20px; padding: 6px 14px; font-size: 13px; color: var(--text-dim); margin-bottom: 16px; }

  .recipe-card { background: var(--surface); border-radius: var(--radius); overflow: hidden; margin-bottom: 12px; }
  .card-hero { background: linear-gradient(135deg, var(--surface2) 0%, #1a3448 100%); padding: 32px 24px 24px; position: relative; display: flex; flex-direction: column; align-items: center; text-align: center; }
  .card-emoji { font-size: 72px; line-height: 1; margin-bottom: 16px; filter: drop-shadow(0 4px 16px rgba(232,168,56,0.3)); }
  .card-badge { position: absolute; top: 16px; left: 16px; background: var(--gold); color: #0F1923; font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.08em; }
  .fav-btn { position: absolute; top: 12px; right: 12px; background: rgba(15,25,35,0.5); border: none; width: 38px; height: 38px; border-radius: 50%; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.2s; -webkit-tap-highlight-color: transparent; }
  .fav-btn:active { transform: scale(1.25); }
  .card-title { font-family: 'Playfair Display', serif; font-size: 22px; line-height: 1.3; color: var(--text); margin-bottom: 4px; }
  .card-type { font-size: 13px; color: var(--gold); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; margin-bottom: 16px; }
  .card-meta { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
  .meta-item { display: flex; align-items: center; gap: 5px; font-size: 13px; color: var(--text-dim); }

  .card-body { padding: 20px 20px 4px; }
  .section-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em; color: var(--gold); margin-bottom: 10px; }
  .ingredients-list { list-style: none; display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
  .ingredients-list li { background: var(--surface2); padding: 6px 12px; border-radius: 20px; font-size: 13px; }
  .steps-list { list-style: none; margin-bottom: 20px; }
  .step-item { display: flex; gap: 12px; margin-bottom: 14px; }
  .step-num { flex-shrink: 0; width: 28px; height: 28px; background: var(--gold); color: #0F1923; font-weight: 700; font-size: 13px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-top: 1px; }
  .step-text { font-size: 14px; line-height: 1.6; padding-top: 3px; }
  .tip-box { background: rgba(232,168,56,0.1); border-left: 3px solid var(--gold); border-radius: 0 12px 12px 0; padding: 12px 14px; font-size: 13px; color: var(--text-dim); line-height: 1.5; margin-bottom: 20px; }

  .card-actions { padding: 0 20px 20px; display: flex; gap: 10px; }
  .btn { flex: 1; padding: 14px; border-radius: 14px; border: none; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; -webkit-tap-highlight-color: transparent; }
  .btn-primary { background: var(--gold); color: #0F1923; }
  .btn-primary:active { background: var(--gold-light); }
  .btn-secondary { background: var(--surface2); color: var(--text); }
  .btn-secondary:active { background: #2e4255; }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-dim); }
  .empty-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-title { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--text); margin-bottom: 8px; }
  .empty-text { font-size: 14px; line-height: 1.6; }

  .loading { text-align: center; padding: 80px 20px; }
  .loading-spinner { font-size: 40px; animation: spin 1.5s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: var(--text-dim); margin-top: 16px; font-size: 14px; }

  .error-box { background: rgba(232,80,80,0.1); border: 1px solid rgba(232,80,80,0.3); border-radius: 16px; padding: 20px; margin: 20px 0; text-align: center; }
  .error-box p { font-size: 14px; line-height: 1.6; color: var(--text-dim); }
  .error-box strong { color: #ff6b6b; display: block; margin-bottom: 8px; font-size: 16px; }

  .fav-count-badge { display: inline-block; background: var(--gold); color: #0F1923; font-size: 11px; font-weight: 700; min-width: 18px; height: 18px; border-radius: 9px; text-align: center; line-height: 18px; padding: 0 4px; margin-left: 4px; }

  .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--surface2); color: var(--text); padding: 12px 22px; border-radius: 30px; font-size: 14px; font-weight: 500; opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap; z-index: 1000; border: 1px solid rgba(255,255,255,0.08); }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @keyframes slideIn { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  .slide-in { animation: slideIn 0.3s ease forwards; }
  @media (prefers-reduced-motion: reduce) { .slide-in { animation: none; } }

  /* Favoris – liste */
  .fav-list { display: flex; flex-direction: column; gap: 0; }
  .fav-row { display: flex; align-items: center; justify-content: space-between; background: var(--surface); border-radius: 14px; padding: 14px 16px; margin-bottom: 8px; cursor: pointer; transition: background 0.15s; -webkit-tap-highlight-color: transparent; }
  .fav-row:active { background: var(--surface2); }
  .fav-row-left { display: flex; align-items: center; gap: 12px; min-width: 0; }
  .fav-row-emoji { font-size: 28px; flex-shrink: 0; }
  .fav-row-info { min-width: 0; }
  .fav-row-title { font-family: 'Playfair Display', serif; font-size: 15px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px; }
  .fav-row-meta { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
  .fav-row-arrow { color: var(--gold); font-size: 18px; flex-shrink: 0; margin-left: 8px; }

  /* Favoris – vue détail */
  .fav-detail-back { display: flex; align-items: center; gap: 8px; background: none; border: none; color: var(--gold); font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; padding: 0 0 16px 0; -webkit-tap-highlight-color: transparent; }
  .btn-danger { background: rgba(232,80,80,0.15); color: #ff6b6b; border: 1px solid rgba(232,80,80,0.3); }
  .btn-danger:active { background: rgba(232,80,80,0.3); }
</style>

<meta name="apple-mobile-web-app-title" content="Recettes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" id="pwa-manifest">
</head>
<body>
<div class="app">
  <header>
    <div class="logo">
      <span class="logo-icon">👨‍🍳</span>
      <span class="logo-text">Bonjour Nawel !</span>
    </div>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="showScreen('today')">Aujourd'hui</button>
    <button class="tab" onclick="showScreen('explore')">Explorer</button>
    <button class="tab" onclick="showScreen('favs')">Favoris <span id="fav-count-tab"></span></button>
  </div>

  <div class="search-wrap">
    <div class="search-row">
      <input class="search-input" id="search-input" type="text" placeholder="Ex : poulet, rapide, thym…" autocomplete="off"
        onkeydown="if(event.key==='Enter') applySearch()">
      <button class="search-btn" onclick="applySearch()">↵</button>
    </div>
    <p class="search-hint" id="search-hint">Tapez des mots-clés pour filtrer les suggestions</p>
  </div>

  <div class="filter-row">
    <button class="chip active" onclick="setFilter(this,'all')">Tout</button>
    <button class="chip" onclick="setFilter(this,'entree')">Entrée</button>
    <button class="chip" onclick="setFilter(this,'plat')">Plat</button>
    <button class="chip" onclick="setFilter(this,'facile')">Facile</button>
    <button class="chip" onclick="setFilter(this,'moyen')">Moyen</button>
  </div>

  <div class="main">
    <div class="screen active" id="screen-today">
      <div class="date-pill">📅 <span id="today-date"></span></div>
      <div id="today-wrap"></div>
    </div>
    <div class="screen" id="screen-explore">
      <div id="explore-wrap"></div>
    </div>
    <div class="screen" id="screen-favs">
      <div id="favs-wrap"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONFIG ──────────────────────────────────────────────
// Nom du fichier JSON : doit être dans le même dossier que ce HTML
const JSON_FILE = 'recettes_chef_ultime_400.json';

// ── STATE ───────────────────────────────────────────────
let RECIPES = [];
let favorites = JSON.parse(localStorage.getItem('chef_favs') || '[]');
let currentScreen = 'today';
let currentFilter = 'all';
let searchKeywords = '';
let todayRecipe = null;
let exploreRecipe = null;

// ── CHARGEMENT JSON ─────────────────────────────────────
async function loadRecipes() {
  showLoading('today-wrap');
  try {
    const response = await fetch(JSON_FILE);
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    RECIPES = await response.json();
    init();
  } catch (err) {
    showLoadError('today-wrap', err);
  }
}

function showLoading(targetId) {
  document.getElementById(targetId).innerHTML = `
    <div class="loading">
      <span class="loading-spinner">🍳</span>
      <p class="loading-text">Chargement des recettes…</p>
    </div>`;
}

function showLoadError(targetId, err) {
  document.getElementById(targetId).innerHTML = `
    <div class="error-box">
      <strong>⚠️ Impossible de charger les recettes</strong>
      <p>Assurez-vous que <strong>${JSON_FILE}</strong> se trouve dans le même dossier que ce fichier HTML.</p>
      <p style="margin-top:8px;font-size:12px;opacity:0.6">${err.message}</p>
    </div>`;
}

// ── UTILS ───────────────────────────────────────────────
function saveFavs() { localStorage.setItem('chef_favs', JSON.stringify(favorites)); }
function isFav(id) { return favorites.includes(id); }

function toggleFav(id) {
  if (isFav(id)) {
    favorites = favorites.filter(f => f !== id);
    showToast('Retiré des favoris');
  } else {
    favorites.push(id);
    showToast('✨ Ajouté aux favoris !');
  }
  saveFavs();
  updateFavCount();
  document.querySelectorAll(`.fav-btn[data-id="${id}"]`).forEach(btn => {
    btn.textContent = isFav(id) ? '❤️' : '🤍';
  });
  if (currentScreen === 'favs') renderFavs();
}

function updateFavCount() {
  const el = document.getElementById('fav-count-tab');
  el.innerHTML = favorites.length > 0 ? `<span class="fav-count-badge">${favorites.length}</span>` : '';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function formatDate() {
  return new Date().toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
}

// ── FILTRAGE ────────────────────────────────────────────
function getPool() {
  let pool = [...RECIPES];
  if (currentFilter === 'entree') pool = pool.filter(r => r.type === 'entree');
  else if (currentFilter === 'plat') pool = pool.filter(r => r.type === 'plat');
  else if (currentFilter === 'facile') pool = pool.filter(r => r.difficulty === 'facile');
  else if (currentFilter === 'moyen') pool = pool.filter(r => r.difficulty === 'moyen');
  if (searchKeywords) {
    const words = searchKeywords.toLowerCase().split(/\s+/).filter(Boolean);
    pool = pool.filter(r => {
      const hay = [r.title, r.type, r.difficulty, ...r.ingredients, ...r.steps, r.tips].join(' ').toLowerCase();
      return words.every(w => hay.includes(w));
    });
  }
  return pool;
}

function pickRandom(pool, excludeId = null) {
  const p = excludeId ? pool.filter(r => r.id !== excludeId) : pool;
  const src = p.length ? p : pool;
  return src[Math.floor(Math.random() * src.length)];
}

// ── RENDU CARTE ─────────────────────────────────────────
function cardHTML(recipe, withNext = true) {
  const fav = isFav(recipe.id);
  const typeLabel = recipe.type === 'entree' ? 'Entrée' : 'Plat';
  const steps = recipe.steps.map((s, i) => {
    const txt = s.replace(/^Étape \d+ : /, '');
    return `<li class="step-item"><span class="step-num">${i+1}</span><span class="step-text">${txt}</span></li>`;
  }).join('');
  const ings = recipe.ingredients.map(i => `<li>${i}</li>`).join('');
  const actions = withNext
    ? `<button class="btn btn-secondary" onclick="nextRecipe()">🔄 Autre recette</button>
       <button class="btn btn-primary" onclick="toggleFav(${recipe.id})">${fav ? '❤️ Favori' : '🤍 Garder'}</button>`
    : `<button class="btn btn-secondary" onclick="toggleFav(${recipe.id})">${fav ? '❤️ Retirer' : '🤍 Favoris'}</button>`;
  return `
<div class="recipe-card slide-in">
  <div class="card-hero">
    <span class="card-badge">${typeLabel}</span>
    <button class="fav-btn" data-id="${recipe.id}" onclick="toggleFav(${recipe.id})">${fav ? '❤️' : '🤍'}</button>
    <div class="card-emoji">${recipe.illustration}</div>
    <div class="card-title">${recipe.title}</div>
    <div class="card-type">${typeLabel}</div>
    <div class="card-meta">
      <span class="meta-item">⏱ ${recipe.time}</span>
      <span class="meta-item">👤 ${recipe.servings} pers.</span>
      <span class="meta-item">🔥 ${recipe.calories} kcal</span>
      <span class="meta-item">${recipe.difficulty === 'facile' ? '🟢' : '🟡'} ${recipe.difficulty}</span>
    </div>
  </div>
  <div class="card-body">
    <p class="section-label">Ingrédients</p>
    <ul class="ingredients-list">${ings}</ul>
    <p class="section-label">Préparation</p>
    <ul class="steps-list">${steps}</ul>
    <div class="tip-box">${recipe.tips}</div>
  </div>
  <div class="card-actions">${actions}</div>
</div>`;
}

function emptyHTML(title, text) {
  return `<div class="empty-state"><div class="empty-icon">🍽️</div><div class="empty-title">${title}</div><p class="empty-text">${text}</p></div>`;
}

// ── ÉCRANS ──────────────────────────────────────────────
function renderToday(reset = false) {
  const pool = getPool();
  if (reset || !todayRecipe || !pool.find(r => r.id === todayRecipe.id)) {
    if (!searchKeywords && currentFilter === 'all') {
      const key = new Date().toISOString().slice(0, 10);
      let hash = 0;
      for (let i = 0; i < key.length; i++) hash = (hash * 31 + key.charCodeAt(i)) & 0xffffffff;
      todayRecipe = RECIPES[Math.abs(hash) % RECIPES.length];
    } else {
      todayRecipe = pickRandom(pool);
    }
  }
  document.getElementById('today-date').textContent = formatDate();
  document.getElementById('today-wrap').innerHTML = pool.length && todayRecipe
    ? cardHTML(todayRecipe, true)
    : emptyHTML('Aucune recette trouvée', 'Essayez d\'autres mots-clés ou modifiez les filtres.');
}

function renderExplore(reset = false) {
  const pool = getPool();
  if (reset || !exploreRecipe || !pool.find(r => r.id === exploreRecipe.id)) {
    exploreRecipe = pickRandom(pool);
  }
  document.getElementById('explore-wrap').innerHTML = pool.length && exploreRecipe
    ? cardHTML(exploreRecipe, true)
    : emptyHTML('Aucune recette trouvée', 'Essayez d\'autres mots-clés ou modifiez les filtres.');
}

function renderFavs() {
  const wrap = document.getElementById('favs-wrap');
  if (!favorites.length) {
    wrap.innerHTML = emptyHTML('Pas encore de favoris', 'Appuyez sur 🤍 pour garder une recette qui vous plaît.');
    return;
  }
  const list = favorites.map(id => RECIPES.find(r => r.id === id)).filter(Boolean);
  const rows = list.map(r => `
    <div class="fav-row" onclick="showFavDetail(${r.id})">
      <div class="fav-row-left">
        <span class="fav-row-emoji">${r.illustration}</span>
        <div class="fav-row-info">
          <div class="fav-row-title">${r.title}</div>
          <div class="fav-row-meta">⏱ ${r.time} &nbsp;·&nbsp; ${r.type === 'entree' ? 'Entrée' : 'Plat'} &nbsp;·&nbsp; ${r.difficulty}</div>
        </div>
      </div>
      <span class="fav-row-arrow">›</span>
    </div>`).join('');
  wrap.innerHTML = `<div class="fav-list">${rows}</div>`;
}

function showFavDetail(id) {
  const recipe = RECIPES.find(r => r.id === id);
  if (!recipe) return;
  const wrap = document.getElementById('favs-wrap');
  const typeLabel = recipe.type === 'entree' ? 'Entrée' : 'Plat';
  const steps = recipe.steps.map((s, i) => {
    const txt = s.replace(/^Étape \d+ : /, '');
    return `<li class="step-item"><span class="step-num">${i+1}</span><span class="step-text">${txt}</span></li>`;
  }).join('');
  const ings = recipe.ingredients.map(i => `<li>${i}</li>`).join('');
  wrap.innerHTML = `
    <button class="fav-detail-back" onclick="renderFavs()">‹ Retour aux favoris</button>
    <div class="recipe-card slide-in">
      <div class="card-hero">
        <span class="card-badge">${typeLabel}</span>
        <div class="card-emoji">${recipe.illustration}</div>
        <div class="card-title">${recipe.title}</div>
        <div class="card-type">${typeLabel}</div>
        <div class="card-meta">
          <span class="meta-item">⏱ ${recipe.time}</span>
          <span class="meta-item">👤 ${recipe.servings} pers.</span>
          <span class="meta-item">🔥 ${recipe.calories} kcal</span>
          <span class="meta-item">${recipe.difficulty === 'facile' ? '🟢' : '🟡'} ${recipe.difficulty}</span>
        </div>
      </div>
      <div class="card-body">
        <p class="section-label">Ingrédients</p>
        <ul class="ingredients-list">${ings}</ul>
        <p class="section-label">Préparation</p>
        <ul class="steps-list">${steps}</ul>
        <div class="tip-box">${recipe.tips}</div>
      </div>
      <div class="card-actions">
        <button class="btn btn-danger" onclick="removeFavAndBack(${recipe.id})">🗑 Supprimer des favoris</button>
      </div>
    </div>`;
}

function removeFavAndBack(id) {
  favorites = favorites.filter(f => f !== id);
  saveFavs();
  updateFavCount();
  showToast('Retiré des favoris');
  renderFavs();
}

function nextRecipe() {
  const pool = getPool();
  if (currentScreen === 'today') {
    todayRecipe = pickRandom(pool, todayRecipe?.id);
    renderToday();
  } else {
    exploreRecipe = pickRandom(pool, exploreRecipe?.id);
    renderExplore();
  }
}

function showScreen(name) {
  currentScreen = name;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  ['today','explore','favs'].forEach((n, i) => {
    if (n === name) document.querySelectorAll('.tab')[i].classList.add('active');
  });
  if (name === 'today') renderToday();
  else if (name === 'explore') renderExplore(true);
  else renderFavs();
}

function setFilter(el, val) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  currentFilter = val;
  todayRecipe = null; exploreRecipe = null;
  if (currentScreen === 'today') renderToday(true);
  else if (currentScreen === 'explore') renderExplore(true);
}

function applySearch() {
  const val = document.getElementById('search-input').value.trim();
  searchKeywords = val;
  const pool = getPool();
  document.getElementById('search-hint').textContent = val
    ? `Filtré par : "${val}" — ${pool.length} recette(s) trouvée(s)`
    : 'Tapez des mots-clés pour filtrer les suggestions';
  todayRecipe = null; exploreRecipe = null;
  if (currentScreen === 'today') renderToday(true);
  else if (currentScreen === 'explore') renderExplore(true);
  else renderFavs();
}

// ── INIT ────────────────────────────────────────────────
function init() {
  updateFavCount();
  document.getElementById('today-date').textContent = formatDate();
  renderToday();
}

loadRecipes();
</script>

// ── SERVICE WORKER ───────────────────────────────────────
if ('serviceWorker' in navigator) {
  const swCode = `
const CACHE = 'nawel-recettes-v1';
const ASSETS = ['./', './index.html'];
self.addEventListener('install', e => {
  e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS)));
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(keys =>
    Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
  ));
  self.clients.claim();
});
self.addEventListener('fetch', e => {
  e.respondWith(
    caches.match(e.request).then(cached => cached || fetch(e.request).catch(() => caches.match('./index.html')))
  );
});`;
  const swBlob = new Blob([swCode], {type: 'application/javascript'});
  const swUrl = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}

// ── PROMPT INSTALLATION ANDROID ─────────────────────────
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  showInstallBanner();
});

function showInstallBanner() {
  if (document.getElementById('install-banner')) return;
  const banner = document.createElement('div');
  banner.id = 'install-banner';
  banner.innerHTML = `
    <div style="
      position:fixed; bottom:90px; left:50%; transform:translateX(-50%);
      background:#1C2B38; border:1.5px solid #E8A838; border-radius:18px;
      padding:14px 18px; display:flex; align-items:center; gap:12px;
      z-index:9999; max-width:360px; width:calc(100% - 40px);
      box-shadow:0 8px 32px rgba(0,0,0,0.4);">
      <span style="font-size:32px">👩‍🍳</span>
      <div style="flex:1; min-width:0;">
        <div style="font-family:'Playfair Display',serif; font-size:14px; color:#F0EDE6; margin-bottom:2px;">Installer l'application</div>
        <div style="font-size:12px; color:#8FA3B0;">Accédez à vos recettes depuis l'écran d'accueil</div>
      </div>
      <div style="display:flex; flex-direction:column; gap:6px;">
        <button onclick="doInstall()" style="
          background:#E8A838; border:none; border-radius:10px; padding:8px 14px;
          font-family:'Inter',sans-serif; font-size:13px; font-weight:600;
          color:#0F1923; cursor:pointer; white-space:nowrap;">Installer</button>
        <button onclick="dismissBanner()" style="
          background:transparent; border:none; font-size:12px;
          color:#8FA3B0; cursor:pointer; padding:2px;">Plus tard</button>
      </div>
    </div>`;
  document.body.appendChild(banner);
}

function doInstall() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(() => { deferredPrompt = null; dismissBanner(); });
}

function dismissBanner() {
  const b = document.getElementById('install-banner');
  if (b) b.remove();
}

// Masquer la bannière si déjà installée
window.addEventListener('appinstalled', () => dismissBanner());
</script>
