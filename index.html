<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#D85A30">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Chef du Jour">
<title>Chef du Jour</title>
<link rel="manifest" href="manifest.json">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;-webkit-text-size-adjust:100%}
body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1A1410;color:#1A1410;overscroll-behavior:none;-webkit-font-smoothing:antialiased}
input,button{font-family:inherit}
::-webkit-scrollbar{display:none}
scrollbar-width:none;

:root{
  --or:#D85A30;--or-d:#A8401E;--or-bg:#FAECE7;--or-rim:#F5C4B3;--or-gl:rgba(216,90,48,.18);
  --p:#FAF7F2;--p2:#F2EDE4;--p3:#E8E0D4;
  --ash:#8A8078;--coal:#3C3028;--ink:#1A1410;
  --gr:#2E7D32;--gr-bg:#EBF5EC;
  --nav:58px;
  --st:env(safe-area-inset-top,0px);
  --sb:env(safe-area-inset-bottom,0px);
}

/* SHELL */
#app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto;background:var(--p);overflow:hidden;position:relative}

/* SCREENS */
.scr{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;display:none;padding-bottom:calc(var(--nav) + var(--sb) + 12px)}
.scr.on{display:block}

/* NAV */
#nav{height:calc(var(--nav) + var(--sb));padding-bottom:var(--sb);background:#1A1410;display:flex;border-top:1px solid rgba(255,255,255,.06);flex-shrink:0;position:relative;z-index:50}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;border:none;background:none;color:#5C5450;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:6px 0;transition:color .15s;position:relative;cursor:pointer}
.nb.on{color:var(--or)}
.nb svg{width:22px;height:22px;stroke:currentColor;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round;display:block}
.nbd{position:absolute;top:8px;right:calc(50% - 19px);min-width:16px;height:16px;border-radius:8px;background:var(--or);color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 3px;opacity:0;transform:scale(0);transition:all .2s cubic-bezier(.34,1.56,.64,1)}
.nbd.on{opacity:1;transform:scale(1)}

/* TOAST */
#toast{position:fixed;bottom:calc(var(--nav) + var(--sb) + 14px);left:50%;transform:translateX(-50%) translateY(18px);background:#1A1410;color:#FAF7F2;padding:10px 20px;border-radius:100px;font-size:13px;font-weight:600;white-space:nowrap;opacity:0;pointer-events:none;z-index:200;transition:all .26s cubic-bezier(.34,1.56,.64,1);border:1px solid rgba(255,255,255,.08);max-width:88vw;text-align:center}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* HERO */
.hero{background:#1A1410;padding:calc(var(--st) + 44px) 18px 26px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-80px;right:-80px;width:240px;height:240px;border-radius:50%;background:radial-gradient(circle,rgba(216,90,48,.14) 0%,transparent 65%);pointer-events:none}
.hfade{position:absolute;bottom:0;left:0;right:0;height:24px;background:linear-gradient(transparent,var(--p));pointer-events:none}
.heye{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--or);margin-bottom:8px}
.htitle{font-size:clamp(24px,6.5vw,32px);font-weight:700;color:#FAF7F2;line-height:1.15;margin-bottom:6px}
.hsub{font-size:13px;color:#6B6058;line-height:1.5}

/* SEARCH */
.swrap{padding:14px 14px 0}
.srow{display:flex;gap:9px;align-items:center}
.kw{flex:1;padding:11px 15px;border:1.5px solid var(--p3);border-radius:100px;background:#fff;font-size:15px;color:var(--ink);transition:border-color .15s;min-width:0}
.kw:focus{border-color:var(--or);outline:none}
.kw::placeholder{color:#B0A8A0}
.sbtn{width:44px;height:44px;border-radius:50%;background:var(--or);flex-shrink:0;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px var(--or-gl);transition:transform .15s,box-shadow .15s;border:none;cursor:pointer}
.sbtn:active{transform:scale(.92);box-shadow:none}
.sbtn svg{width:18px;height:18px;stroke:#fff;stroke-width:2.4;fill:none;stroke-linecap:round}

/* TAGS */
.trow{display:flex;gap:7px;padding:10px 14px 0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tag{padding:6px 13px;border-radius:100px;flex-shrink:0;border:1.5px solid var(--p3);background:#fff;font-size:12px;font-weight:600;color:var(--ash);cursor:pointer;transition:all .14s;white-space:nowrap;-webkit-user-select:none;user-select:none}
.tag.on{border-color:var(--or-rim);background:var(--or-bg);color:var(--or-d)}

/* RECIPE CARD */
#rArea{padding:12px 14px 0}
.rc{background:#fff;border-radius:16px;border:1px solid var(--p3);overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.07)}
.rc.in{animation:cIn .3s cubic-bezier(.34,1.15,.64,1) both}
@keyframes cIn{from{opacity:0;transform:translateX(18px)}to{opacity:1;transform:none}}
.cvis{height:160px;background:#1A1410;display:flex;align-items:center;justify-content:center;font-size:68px;position:relative;flex-shrink:0}
.cvis::after{content:'';position:absolute;inset:0;background:linear-gradient(transparent 40%,rgba(0,0,0,.42))}
.cch{position:absolute;bottom:9px;left:11px;right:11px;display:flex;gap:5px;flex-wrap:wrap;z-index:1}
.cc{padding:3px 9px;border-radius:100px;background:rgba(255,255,255,.15);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.2);font-size:11px;font-weight:600;color:rgba(255,255,255,.92)}
.cbody{padding:14px}
.tbadge{display:inline-block;padding:3px 9px;border-radius:100px;font-size:11px;font-weight:700;margin-bottom:8px}
.te{background:#EBF5EC;color:#1B5E20}
.tp{background:#E3F2FD;color:#0D47A1}
.cname{font-size:19px;font-weight:700;color:var(--ink);line-height:1.25;margin-bottom:5px}
.cdesc{font-size:13px;color:var(--ash);line-height:1.6;margin-bottom:13px}
.sh{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--or);margin-bottom:7px}
.ings{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.ing{padding:4px 11px;border-radius:100px;background:var(--p2);border:1px solid var(--p3);font-size:12px;font-weight:500;color:var(--coal)}
.steps{margin-bottom:14px}
.step{display:flex;gap:9px;margin-bottom:9px;align-items:flex-start}
.sn{width:21px;height:21px;border-radius:50%;flex-shrink:0;background:var(--p2);border:1px solid var(--p3);font-size:11px;font-weight:700;color:var(--ash);display:flex;align-items:center;justify-content:center;margin-top:1px}
.st{font-size:13px;color:var(--coal);line-height:1.6}
.cacts{display:flex;gap:7px}
.bsave{flex:1;padding:11px;border-radius:11px;background:var(--or);color:#fff;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:6px;box-shadow:0 3px 10px var(--or-gl);transition:all .14s;border:none;cursor:pointer}
.bsave:active{transform:scale(.97);box-shadow:none}
.bsave.on{background:var(--gr)}
.bsave svg{width:16px;height:16px;stroke:#fff;stroke-width:2;fill:none;stroke-linecap:round}
.both{padding:11px 14px;border-radius:11px;border:1.5px solid var(--p3);background:#fff;font-size:13px;font-weight:700;color:var(--ash);display:flex;align-items:center;gap:5px;transition:background .14s;cursor:pointer}
.both:active{background:var(--p2)}
.both svg{width:14px;height:14px;stroke:currentColor;stroke-width:2.2;fill:none;stroke-linecap:round}

/* EXPLORE */
.exh{background:#1A1410;padding:calc(var(--st) + 44px) 18px 22px;position:relative;overflow:hidden}
.exh::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(216,90,48,.12) 0%,transparent 65%);pointer-events:none}
.exeye{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--or);margin-bottom:7px}
.extitle{font-size:clamp(24px,6.5vw,32px);font-weight:700;color:#FAF7F2;line-height:1.15}
.exsub{font-size:13px;color:#6B6058;margin-top:5px}
.exsearch{padding:12px 14px 0}
.exinput{width:100%;padding:11px 15px;border:1.5px solid var(--p3);border-radius:100px;background:#fff;font-size:15px;color:var(--ink);transition:border-color .15s}
.exinput:focus{border-color:var(--or);outline:none}
.exinput::placeholder{color:#B0A8A0}
.exfil{display:flex;gap:7px;padding:10px 14px 0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.fc{padding:6px 13px;border-radius:100px;flex-shrink:0;border:1.5px solid var(--p3);background:#fff;font-size:12px;font-weight:600;color:var(--ash);cursor:pointer;transition:all .14s;white-space:nowrap}
.fc.on{border-color:var(--or-rim);background:var(--or-bg);color:var(--or-d)}
.excnt{font-size:12px;color:#B0A8A0;padding:7px 18px 2px;font-weight:500}
.grid{padding:6px 14px 0;display:flex;flex-direction:column;gap:7px}
.gi{background:#fff;border-radius:13px;border:1px solid var(--p3);display:flex;align-items:stretch;overflow:hidden;box-shadow:0 1px 7px rgba(0,0,0,.06);min-height:68px;cursor:pointer}
.gi:active{background:var(--p2)}
.ge{width:62px;background:#1A1410;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0}
.gc{flex:1;padding:10px 10px 10px 13px;min-width:0;display:flex;flex-direction:column;justify-content:center}
.gn{font-size:14px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.gm{font-size:11px;color:#B0A8A0;margin-bottom:3px}
.gtags{display:flex;gap:4px;flex-wrap:wrap}
.gtag{padding:2px 7px;border-radius:100px;background:var(--p2);font-size:10px;font-weight:600;color:var(--ash)}
.gtag.te{background:#EBF5EC;color:#1B5E20}
.gtag.tp{background:#E3F2FD;color:#0D47A1}
.ghrt{width:38px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.ghrt svg{width:19px;height:19px;stroke:#C4BAB0;fill:none;stroke-width:2;stroke-linecap:round;transition:all .14s}
.ghrt.on svg{stroke:var(--or);fill:var(--or)}

/* SAVED */
.svh{background:#1A1410;padding:calc(var(--st) + 44px) 18px 22px;position:relative;overflow:hidden}
.svh::before{content:'';position:absolute;top:-60px;left:-60px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(216,90,48,.1) 0%,transparent 65%);pointer-events:none}
.sveye{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--or);margin-bottom:7px}
.svtitle{font-size:clamp(24px,6.5vw,32px);font-weight:700;color:#FAF7F2;line-height:1.15}
.svcnt{font-size:13px;color:#6B6058;margin-top:5px}
.empty{text-align:center;padding:44px 22px;display:flex;flex-direction:column;align-items:center;gap:11px}
.eico{font-size:46px}
.etitle{font-size:18px;font-weight:700;color:var(--ink)}
.esub{font-size:14px;color:var(--ash);line-height:1.6;max-width:240px}
.svgrid{padding:10px 14px 0;display:flex;flex-direction:column;gap:7px}

/* SHEET */
#bd{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .26s}
#bd.on{opacity:1;pointer-events:all}
#sht{background:var(--p);border-radius:18px 18px 0 0;max-height:91dvh;overflow-y:auto;-webkit-overflow-scrolling:touch;width:100%;max-width:480px;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);padding-bottom:calc(var(--sb) + 8px)}
#bd.on #sht{transform:translateY(0)}
.shdl{display:flex;justify-content:center;padding:12px 0 0}
.shdl span{width:34px;height:4px;border-radius:2px;background:var(--p3);display:block}
.shhr{background:#1A1410;padding:16px 18px 22px;position:relative;overflow:hidden}
.shhr::before{content:'';position:absolute;top:-50px;right:-50px;width:170px;height:170px;border-radius:50%;background:radial-gradient(circle,rgba(216,90,48,.12) 0%,transparent 65%);pointer-events:none}
.shcl{position:absolute;top:13px;right:13px;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;border:none;cursor:pointer}
.shcl svg{width:15px;height:15px;stroke:rgba(255,255,255,.7);stroke-width:2;fill:none;stroke-linecap:round}
.she{font-size:46px;margin-bottom:11px;display:block;line-height:1}
.shn{font-size:22px;font-weight:700;color:#FAF7F2;line-height:1.2;margin-bottom:9px}
.shchs{display:flex;flex-wrap:wrap;gap:5px}
.shch{padding:4px 10px;border-radius:100px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);font-size:11px;font-weight:600;color:rgba(255,255,255,.75)}
.shbody{padding:18px 16px 22px}
.shdesc{font-size:14px;color:var(--ash);line-height:1.65;margin-bottom:18px}
.shsv{width:100%;padding:13px;border-radius:13px;background:var(--or);color:#fff;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 3px 12px var(--or-gl);transition:all .15s;border:none;cursor:pointer}
.shsv:active{transform:scale(.97)}
.shsv.on{background:var(--gr);box-shadow:none}
.shsv svg{width:17px;height:17px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round}

/* INSTALL BANNER */
#ib{display:none;align-items:center;gap:10px;margin:10px 14px 0;padding:10px 13px;border-radius:11px;background:#1A1410;color:#FAF7F2}
#ib.on{display:flex}
#ib svg{width:17px;height:17px;stroke:var(--or);stroke-width:2;fill:none;flex-shrink:0}
.ibt{flex:1}.ibtitle{font-size:13px;font-weight:600}.ibsub{font-size:11px;opacity:.6;margin-top:1px}
.ibx{opacity:.5;font-size:18px;padding:0 4px;line-height:1;cursor:pointer}
</style>
</head>
<body>
<div id="app">
<div id="toast"></div>

<!-- SHEET -->
<div id="bd" onclick="maybeClose(event)">
  <div id="sht">
    <div class="shdl"><span></span></div>
    <div class="shhr">
      <button class="shcl" onclick="closeSheet()"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      <span class="she" id="sE"></span>
      <div class="shn" id="sN"></div>
      <div class="shchs" id="sCH"></div>
    </div>
    <div class="shbody">
      <p class="shdesc" id="sD"></p>
      <div class="sh">Ingrédients</div>
      <div class="ings" id="sI" style="margin-bottom:16px"></div>
      <div class="sh">Préparation</div>
      <div class="steps" id="sS" style="margin-bottom:16px"></div>
      <button class="shsv" id="shSvBtn" onclick="shSave()">
        <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        Sauvegarder
      </button>
    </div>
  </div>
</div>

<!-- ACCUEIL -->
<div id="s0" class="scr on">
  <div class="hero">
    <div class="heye" id="hDate">…</div>
    <div class="htitle">Que mangez-vous<br>aujourd'hui ?</div>
    <div class="hsub" id="hSub">200 recettes · Fonctionne hors-ligne</div>
    <div class="hfade"></div>
  </div>
  <div id="ib">
    <svg viewBox="0 0 24 24"><path d="M12 2v13M8 11l4 4 4-4"/><path d="M20 17v2a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-2"/></svg>
    <div class="ibt"><div class="ibtitle">Installer l'app</div><div class="ibsub">Accès rapide depuis l'écran d'accueil</div></div>
    <span class="ibx" onclick="dismissInstall(event)">✕</span>
  </div>
  <div class="swrap">
    <div class="srow">
      <input class="kw" id="kwI" type="text" placeholder="Chercher un plat, un ingrédient…" oninput="onKw()">
      <button class="sbtn" onclick="shuffle()" aria-label="Recette aléatoire">
        <svg viewBox="0 0 24 24"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
      </button>
    </div>
  </div>
  <div class="trow" id="hTags">
    <button class="tag on" onclick="pickTag(this,'')">✨ Tous</button>
    <button class="tag" onclick="pickTag(this,'Entrée')">🥗 Entrées</button>
    <button class="tag" onclick="pickTag(this,'Plat')">🍽️ Plats</button>
    <button class="tag" onclick="pickTag(this,'Végétarien')">🥦 Végétarien</button>
    <button class="tag" onclick="pickTag(this,'Vegan')">🌿 Vegan</button>
    <button class="tag" onclick="pickTag(this,'Rapide')">⚡ Rapide</button>
    <button class="tag" onclick="pickTag(this,'Épicé')">🌶️ Épicé</button>
    <button class="tag" onclick="pickTag(this,'Français')">🥖 Français</button>
    <button class="tag" onclick="pickTag(this,'Italien')">🇮🇹 Italien</button>
    <button class="tag" onclick="pickTag(this,'Asiatique')">🥢 Asiatique</button>
    <button class="tag" onclick="pickTag(this,'Healthy')">💚 Healthy</button>
    <button class="tag" onclick="pickTag(this,'Sans gluten')">🌾 Sans gluten</button>
  </div>
  <div id="rArea"></div>
</div>

<!-- EXPLORER -->
<div id="s1" class="scr">
  <div class="exh">
    <div class="exeye">Catalogue</div>
    <div class="extitle">Explorer</div>
    <div class="exsub" id="exSub">200 recettes</div>
  </div>
  <div class="exsearch">
    <input class="exinput" id="exI" type="text" placeholder="Rechercher…" oninput="renderEx()">
  </div>
  <div class="exfil" id="exFil">
    <button class="fc on" onclick="pickFil(this,'')">Toutes</button>
    <button class="fc" onclick="pickFil(this,'Entrée')">🥗 Entrées</button>
    <button class="fc" onclick="pickFil(this,'Plat')">🍽️ Plats</button>
    <button class="fc" onclick="pickFil(this,'Végétarien')">🥦 Végétarien</button>
    <button class="fc" onclick="pickFil(this,'Vegan')">🌿 Vegan</button>
    <button class="fc" onclick="pickFil(this,'Rapide')">⚡ Rapide</button>
    <button class="fc" onclick="pickFil(this,'Épicé')">🌶️ Épicé</button>
    <button class="fc" onclick="pickFil(this,'Français')">🥖 Français</button>
    <button class="fc" onclick="pickFil(this,'Italien')">🇮🇹 Italien</button>
    <button class="fc" onclick="pickFil(this,'Asiatique')">🥢 Asiatique</button>
    <button class="fc" onclick="pickFil(this,'Healthy')">💚 Healthy</button>
    <button class="fc" onclick="pickFil(this,'Fruits de mer')">🦐 Mer</button>
  </div>
  <div class="excnt" id="exCnt"></div>
  <div class="grid" id="exGrid"></div>
</div>

<!-- FAVORIS -->
<div id="s2" class="scr">
  <div class="svh">
    <div class="sveye">Mes recettes</div>
    <div class="svtitle">Favoris</div>
    <div class="svcnt" id="svCnt">Aucune recette sauvegardée</div>
  </div>
  <div id="svCon"></div>
</div>

<nav id="nav">
  <button class="nb on" id="nb0" onclick="goS(0)" aria-label="Accueil">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Accueil
  </button>
  <button class="nb" id="nb1" onclick="goS(1)" aria-label="Explorer">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    Explorer
  </button>
  <button class="nb" id="nb2" onclick="goS(2)" aria-label="Favoris">
    <div class="nbd" id="nbd"></div>
    <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
    Favoris
  </button>
</nav>
</div>

<script>
/* ══════════════════════════
   BASE DE RECETTES — 200

let cur=null, hTag='', exFil='', dPr=null;
const GS=()=>{try{return JSON.parse(localStorage.getItem('cdj_v4')||'[]')}catch{return[]}};
const SS=a=>{try{localStorage.setItem('cdj_v4',JSON.stringify(a))}catch{}};
const IS=id=>GS().some(r=>r.id===id);

/* ══════════════════════════
   INIT
   ══════════════════════════ */
(()=>{
  const D=['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  const M=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const d=new Date();
  document.getElementById('hDate').textContent=`${D[d.getDay()]} ${d.getDate()} ${M[d.getMonth()]} ${d.getFullYear()}`;
  document.getElementById('hSub').textContent=`${R.length} recettes · Fonctionne hors-ligne`;
  document.getElementById('exSub').textContent=`${R.length} recettes disponibles`;
  const seed=d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate();
  cur=R[seed%R.length];
  renderCard(cur,false);
  updateBadge();
})();

/* ══════════════════════════
   NAV
   ══════════════════════════ */
function goS(i){
  ['s0','s1','s2'].forEach((s,j)=>{
    document.getElementById(s).style.display=j===i?'block':'none';
  });
  ['nb0','nb1','nb2'].forEach((b,j)=>document.getElementById(b).classList.toggle('on',j===i));
  if(i===1)renderEx();
  if(i===2)renderSaved();
}
document.getElementById('s1').style.display='none';
document.getElementById('s2').style.display='none';

/* ══════════════════════════
   HOME
   ══════════════════════════ */
function pickTag(el,tag){
  document.querySelectorAll('#hTags .tag').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  hTag=tag;
  document.getElementById('kwI').value='';
  showFiltered();
}
function onKw(){
  document.querySelectorAll('#hTags .tag').forEach(t=>t.classList.remove('on'));
  document.querySelector('#hTags .tag').classList.add('on');
  hTag='';
  showFiltered();
}
function pool(){
  const kw=(document.getElementById('kwI').value||'').trim().toLowerCase();
  return R.filter(r=>{
    const mt=!hTag||r.g.includes(hTag);
    const mk=!kw||r.n.toLowerCase().includes(kw)||r.d.toLowerCase().includes(kw)||r.i.some(x=>x.toLowerCase().includes(kw));
    return mt&&mk;
  });
}
function showFiltered(){
  const p=pool();
  if(!p.length){
    document.getElementById('rArea').innerHTML=`<div style="text-align:center;padding:36px 20px;color:var(--ash)"><div style="font-size:34px;margin-bottom:9px">🔍</div><div style="font-size:16px;font-weight:700;color:var(--ink);margin-bottom:5px">Aucun résultat</div><div style="font-size:13px">Essayez un autre mot-clé.</div></div>`;
    return;
  }
  cur=p[Math.floor(Math.random()*p.length)];
  renderCard(cur,true);
}
function shuffle(){
  const p=pool();
  if(!p.length){toast('Aucune recette dans ce filtre');return;}
  let r;
  do{r=p[Math.floor(Math.random()*p.length)];}while(p.length>1&&r.id===cur?.id);
  cur=r;
  renderCard(cur,true);
}

/* ══════════════════════════
   RENDER CARD
   ══════════════════════════ */
function renderCard(r,anim){
  const sv=IS(r.id);
  const chips=[r.tm&&`<div class="cc">⏱ ${r.tm}</div>`,r.df&&`<div class="cc">👨‍🍳 ${r.df}</div>`,r.sv&&`<div class="cc">👥 ${r.sv}</div>`,r.cl&&`<div class="cc">🔥 ${r.cl}</div>`].filter(Boolean).join('');
  const ings=(r.i||[]).map(x=>`<span class="ing">${x}</span>`).join('');
  const steps=(r.s||[]).map((x,i)=>`<div class="step"><div class="sn">${i+1}</div><div class="st">${x}</div></div>`).join('');
  const tc=r.t==='Entrée'?'te':'tp';
  const hf=`<svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:#fff;fill:#fff;stroke-width:2;stroke-linecap:round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`;
  const he=`<svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`;
  document.getElementById('rArea').innerHTML=`
    <div class="rc${anim?' in':''}">
      <div class="cvis">${r.e||'🍽️'}<div class="cch">${chips}</div></div>
      <div class="cbody">
        <span class="tbadge ${tc}">${r.t}</span>
        <div class="cname">${r.n}</div>
        <div class="cdesc">${r.d}</div>
        <div class="sh">Ingrédients</div>
        <div class="ings">${ings}</div>
        <div class="sh">Préparation</div>
        <div class="steps">${steps}</div>
        <div class="cacts">
          <button class="bsave${sv?' on':''}" id="mSvBtn" onclick="saveMain(${r.id})">
            ${sv?hf+' Sauvegardée':he+' Sauvegarder'}
          </button>
          <button class="both" onclick="shuffle()">
            <svg viewBox="0 0 24 24"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
            Autre
          </button>
        </div>
      </div>
    </div>`;
}

/* ══════════════════════════
   SAVE
   ══════════════════════════ */
function saveMain(id){
  const r=R.find(x=>x.id===id);if(!r)return;
  const sv=GS();
  if(sv.some(x=>x.id===id)){toast('Déjà dans vos favoris !');return;}
  sv.unshift(r);SS(sv);updateBadge();
  const btn=document.getElementById('mSvBtn');
  if(btn){btn.classList.add('on');btn.innerHTML=`<svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:#fff;fill:#fff;stroke-width:2;stroke-linecap:round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg> Sauvegardée`;}
  toast('Recette sauvegardée 🎉');
}
function shSave(){
  const id=parseInt(document.getElementById('bd').dataset.id);
  const r=R.find(x=>x.id===id);if(!r)return;
  const sv=GS();
  if(sv.some(x=>x.id===id)){toast('Déjà dans vos favoris !');return;}
  sv.unshift(r);SS(sv);updateBadge();
  const btn=document.getElementById('shSvBtn');
  btn.classList.add('on');
  btn.innerHTML=`<svg viewBox="0 0 24 24" style="width:17px;height:17px;stroke:#fff;fill:#fff;stroke-width:2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg> Sauvegardée`;
  toast('Recette sauvegardée 🎉');
}

/* ══════════════════════════
   EXPLORE
   ══════════════════════════ */
function pickFil(el,f){
  document.querySelectorAll('.fc').forEach(x=>x.classList.remove('on'));
  el.classList.add('on');exFil=f;renderEx();
}
function renderEx(){
  const kw=(document.getElementById('exI')?.value||'').trim().toLowerCase();
  const p=R.filter(r=>{
    const mf=!exFil||r.g.includes(exFil);
    const mk=!kw||r.n.toLowerCase().includes(kw)||r.d.toLowerCase().includes(kw)||r.i.some(x=>x.toLowerCase().includes(kw));
    return mf&&mk;
  });
  document.getElementById('exCnt').textContent=`${p.length} résultat${p.length>1?'s':''}`;
  document.getElementById('exGrid').innerHTML=p.map(r=>{
    const sv=IS(r.id);
    const tc=r.t==='Entrée'?'te':'tp';
    return `<div class="gi" onclick="openSheet(${r.id})">
      <div class="ge">${r.e||'🍽️'}</div>
      <div class="gc">
        <div class="gn">${r.n}</div>
        <div class="gm">${[r.tm&&`⏱ ${r.tm}`,r.df&&`👨‍🍳 ${r.df}`].filter(Boolean).join(' · ')}</div>
        <div class="gtags"><span class="gtag ${tc}">${r.t}</span>${r.g.filter(x=>x!=='Entrée'&&x!=='Plat').slice(0,2).map(x=>`<span class="gtag">${x}</span>`).join('')}</div>
      </div>
      <div class="ghrt${sv?' on':''}" onclick="event.stopPropagation();togSv(${r.id},this)" role="button" aria-label="Favoris">
        <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      </div>
    </div>`;
  }).join('');
}
function togSv(id,el){
  const sv=GS();
  if(sv.some(x=>x.id===id)){SS(sv.filter(x=>x.id!==id));el.classList.remove('on');toast('Retiré des favoris');}
  else{const r=R.find(x=>x.id===id);if(r){sv.unshift(r);SS(sv);el.classList.add('on');toast('Sauvegardée 🎉');}}
  updateBadge();
}

/* ══════════════════════════
   SAVED
   ══════════════════════════ */
function renderSaved(){
  const sv=GS();
  document.getElementById('svCnt').textContent=sv.length?`${sv.length} recette${sv.length>1?'s':''} sauvegardée${sv.length>1?'s':''}`:'Aucune recette sauvegardée';
  const c=document.getElementById('svCon');
  if(!sv.length){
    c.innerHTML=`<div class="empty"><div class="eico">📭</div><div class="etitle">Aucun favori</div><p class="esub">Explorez les recettes et sauvegardez vos coups de cœur !</p></div>`;
    return;
  }
  c.innerHTML=`<div class="svgrid">${sv.map((r,i)=>{
    const tc=r.t==='Entrée'?'te':'tp';
    return `<div class="gi" onclick="openSheet(${r.id})">
      <div class="ge">${r.e||'🍽️'}</div>
      <div class="gc">
        <div class="gn">${r.n}</div>
        <div class="gm">${[r.tm&&`⏱ ${r.tm}`,r.df&&`👨‍🍳 ${r.df}`].filter(Boolean).join(' · ')}</div>
        <div class="gtags"><span class="gtag ${tc}">${r.t}</span></div>
      </div>
      <div class="ghrt" style="cursor:pointer" onclick="event.stopPropagation();delSv(${i})" role="button" aria-label="Supprimer">
        <svg viewBox="0 0 24 24" style="stroke:#C0392B"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg>
      </div>
    </div>`;
  }).join('')}</div>`;
}
function delSv(i){
  const sv=GS();const n=sv[i].n;sv.splice(i,1);SS(sv);updateBadge();renderSaved();toast(`«${n}» supprimée`);
}

/* ══════════════════════════
   SHEET
   ══════════════════════════ */
function openSheet(id){
  const r=R.find(x=>x.id===id);if(!r)return;
  document.getElementById('bd').dataset.id=id;
  document.getElementById('sE').textContent=r.e||'🍽️';
  document.getElementById('sN').textContent=r.n;
  document.getElementById('sD').textContent=r.d;
  document.getElementById('sCH').innerHTML=[
    r.tm&&`<span class="shch">⏱ ${r.tm}</span>`,
    r.df&&`<span class="shch">👨‍🍳 ${r.df}</span>`,
    r.sv&&`<span class="shch">👥 ${r.sv}</span>`,
    r.cl&&`<span class="shch">🔥 ${r.cl}</span>`
  ].filter(Boolean).join('');
  document.getElementById('sI').innerHTML=(r.i||[]).map(x=>`<span class="ing">${x}</span>`).join('');
  document.getElementById('sS').innerHTML=(r.s||[]).map((x,n)=>`<div class="step"><div class="sn">${n+1}</div><div class="st">${x}</div></div>`).join('');
  const btn=document.getElementById('shSvBtn');
  const already=IS(id);
  btn.className='shsv'+(already?' on':'');
  btn.innerHTML=already
    ?`<svg viewBox="0 0 24 24" style="width:17px;height:17px;stroke:#fff;fill:#fff;stroke-width:2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg> Sauvegardée`
    :`<svg viewBox="0 0 24 24" style="width:17px;height:17px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg> Sauvegarder`;
  document.getElementById('bd').classList.add('on');
}
function closeSheet(){document.getElementById('bd').classList.remove('on');}
function maybeClose(e){if(e.target===document.getElementById('bd'))closeSheet();}

/* ══════════════════════════
   BADGE + TOAST
   ══════════════════════════ */
function updateBadge(){
  const n=GS().length,el=document.getElementById('nbd');
  el.textContent=n||'';el.classList.toggle('on',n>0);
}
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('on');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('on'),2700);
}

/* ══════════════════════════
   INSTALL
   ══════════════════════════ */
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();dPr=e;document.getElementById('ib').classList.add('on');
});
document.getElementById('ib').addEventListener('click',async function(e){
  if(e.target.classList.contains('ibx'))return;
  if(dPr){dPr.prompt();await dPr.userChoice;dPr=null;this.classList.remove('on');}
});
function dismissInstall(e){
  e.stopPropagation();
  document.getElementById('ib').classList.remove('on');
}

/* ══════════════════════════
   SERVICE WORKER
   ══════════════════════════ */
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
