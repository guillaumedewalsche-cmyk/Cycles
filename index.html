<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#D85A30">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Chef du Jour">
<title>Chef du Jour</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,400;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',system-ui,sans-serif;background:#1A1410;color:#1A1410}
::-webkit-scrollbar{width:0}
:root{
  --fire:#D85A30;--fire-d:#A8401E;--fire-glow:rgba(216,90,48,.18);--fire-bg:#FAECE7;--fire-rim:#F5C4B3;
  --paper:#FAF7F2;--paper2:#F2EDE4;--paper3:#E8E0D4;
  --stone:#C4BAB0;--ash:#8A8078;--coal:#3C3028;--ink:#1A1410;
  --green:#3A7D44;
  --nav-h:68px;--safe-b:env(safe-area-inset-bottom,0px);
  --r-md:14px;--r-lg:20px;
  --sh:0 2px 16px rgba(0,0,0,.07),0 1px 4px rgba(0,0,0,.04);
  --f-disp:'Cormorant Garamond',Georgia,serif;
}
.app{display:flex;flex-direction:column;height:100dvh;max-width:430px;margin:0 auto;background:var(--paper);position:relative;overflow:hidden;box-shadow:0 0 80px rgba(0,0,0,.6)}
.screens{flex:1;overflow:hidden;position:relative}
.screen{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--nav-h) + var(--safe-b) + 20px);opacity:0;pointer-events:none;transform:translateY(10px);transition:opacity .26s ease,transform .26s ease}
.screen.active{opacity:1;pointer-events:all;transform:translateY(0)}
/* NAV */
.nav{height:calc(var(--nav-h) + var(--safe-b));padding-bottom:var(--safe-b);background:var(--ink);display:flex;flex-shrink:0;border-top:1px solid rgba(255,255,255,.04);position:relative;z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;border:none;background:none;cursor:pointer;color:var(--ash);font-family:'DM Sans',system-ui,sans-serif;font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;padding:8px 0 6px;transition:color .18s;position:relative}
.nav-btn.active{color:var(--fire)}
.nav-btn svg{width:22px;height:22px;stroke:currentColor;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round}
.nav-badge{position:absolute;top:10px;right:calc(50% - 20px);min-width:16px;height:16px;border-radius:8px;background:var(--fire);color:white;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 4px;opacity:0;transform:scale(0);transition:all .2s cubic-bezier(.34,1.56,.64,1)}
.nav-badge.show{opacity:1;transform:scale(1)}
/* TOAST */
.toast{position:fixed;bottom:calc(var(--nav-h) + var(--safe-b) + 14px);left:50%;transform:translateX(-50%) translateY(16px);background:var(--ink);color:var(--paper);padding:11px 22px;border-radius:100px;font-size:13px;font-weight:600;white-space:nowrap;opacity:0;pointer-events:none;z-index:999;transition:all .32s cubic-bezier(.34,1.56,.64,1);border:1px solid rgba(255,255,255,.07)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* HERO */
.home-hero{background:var(--ink);padding:54px 24px 32px;position:relative;overflow:hidden}
.home-hero::before{content:'';position:absolute;top:-100px;right:-100px;width:320px;height:320px;border-radius:50%;background:radial-gradient(circle,rgba(216,90,48,.13) 0%,transparent 65%);pointer-events:none}
.hero-fade{position:absolute;bottom:0;left:0;right:0;height:36px;background:linear-gradient(to bottom,transparent,var(--paper));pointer-events:none}
.hero-eyebrow{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.12em;color:var(--fire);margin-bottom:10px}
.hero-title{font-family:var(--f-disp);font-size:38px;font-style:italic;color:var(--paper);line-height:1.1;margin-bottom:8px}
.hero-sub{font-size:13px;color:var(--ash);font-weight:300;line-height:1.5}
/* SEARCH */
.search-wrap{padding:16px 16px 0}
.search-row{display:flex;gap:10px;align-items:center}
.kw-input{flex:1;padding:13px 16px;border:1.5px solid var(--paper3);border-radius:100px;background:white;font-family:'DM Sans',system-ui,sans-serif;font-size:14px;color:var(--ink);outline:none;transition:border-color .18s,box-shadow .18s}
.kw-input:focus{border-color:var(--fire);box-shadow:0 0 0 3px var(--fire-glow)}
.kw-input::placeholder{color:var(--stone)}
.shuf-btn{width:48px;height:48px;border-radius:50%;border:none;background:var(--fire);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px var(--fire-glow);transition:all .18s}
.shuf-btn:active{transform:scale(.92);box-shadow:none}
.shuf-btn svg{width:20px;height:20px;stroke:white;stroke-width:2.4;fill:none;stroke-linecap:round}
/* TAGS */
.tags-row{display:flex;gap:8px;padding:10px 16px 0;overflow-x:auto;scrollbar-width:none}
.tags-row::-webkit-scrollbar{display:none}
.tag{padding:7px 15px;border-radius:100px;flex-shrink:0;border:1.5px solid var(--paper3);background:white;font-size:12px;font-weight:600;color:var(--ash);cursor:pointer;transition:all .15s}
.tag.on{border-color:var(--fire-rim);background:var(--fire-bg);color:var(--fire-d)}
/* RECIPE CARD */
#recipeArea{padding-top:16px}
.recipe-card{margin:0 16px 12px;border-radius:var(--r-lg);background:white;border:1px solid var(--paper3);overflow:hidden;box-shadow:var(--sh)}
.recipe-card.appear{animation:cardIn .38s cubic-bezier(.34,1.2,.64,1) both}
@keyframes cardIn{from{opacity:0;transform:translateX(24px) scale(.98)}to{opacity:1;transform:translateX(0) scale(1)}}
.card-visual{height:190px;background:var(--ink);display:flex;align-items:center;justify-content:center;font-size:80px;position:relative}
.card-visual::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,transparent 35%,rgba(0,0,0,.45))}
.card-chips{position:absolute;bottom:12px;left:14px;right:14px;display:flex;gap:7px;flex-wrap:wrap;z-index:1}
.chip{padding:4px 11px;border-radius:100px;background:rgba(255,255,255,.14);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.18);font-size:11px;font-weight:600;color:rgba(255,255,255,.9)}
.card-body{padding:20px}
.card-name{font-family:var(--f-disp);font-size:26px;font-weight:600;color:var(--ink);line-height:1.2;margin-bottom:8px}
.card-desc{font-size:13px;color:var(--ash);line-height:1.65;margin-bottom:18px}
.sec-head{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--fire);margin-bottom:10px}
.ing-wrap{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:20px}
.ing{padding:5px 13px;border-radius:100px;background:var(--paper2);border:1px solid var(--paper3);font-size:12px;font-weight:600;color:var(--coal)}
.steps-list{margin-bottom:20px}
.step-row{display:flex;gap:12px;margin-bottom:13px;align-items:flex-start}
.step-n{width:24px;height:24px;border-radius:50%;flex-shrink:0;background:var(--paper2);border:1px solid var(--paper3);font-size:11px;font-weight:700;color:var(--ash);display:flex;align-items:center;justify-content:center;margin-top:1px}
.step-t{font-size:13px;color:var(--coal);line-height:1.6}
.card-actions{display:flex;gap:10px}
.btn-save{flex:1;padding:13px;border-radius:var(--r-md);border:none;background:var(--fire);color:white;font-family:'DM Sans',system-ui,sans-serif;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .18s;box-shadow:0 4px 12px var(--fire-glow)}
.btn-save:active{transform:scale(.97);box-shadow:none}
.btn-save.saved{background:var(--green);box-shadow:none}
.btn-save svg{width:18px;height:18px;stroke:white;stroke-width:2;fill:none;stroke-linecap:round}
.btn-other{padding:13px 18px;border-radius:var(--r-md);border:1.5px solid var(--paper3);background:white;font-family:'DM Sans',system-ui,sans-serif;font-size:13px;font-weight:600;color:var(--ash);cursor:pointer;display:flex;align-items:center;gap:7px;transition:all .15s}
.btn-other:active{background:var(--paper2)}
.btn-other svg{width:16px;height:16px;stroke:currentColor;stroke-width:2.2;fill:none;stroke-linecap:round}
/* EXPLORE */
.explore-header{background:var(--ink);padding:54px 24px 28px;position:relative;overflow:hidden}
.explore-header::before{content:'';position:absolute;top:-80px;right:-80px;width:260px;height:260px;border-radius:50%;background:radial-gradient(circle,rgba(216,90,48,.1) 0%,transparent 65%);pointer-events:none}
.explore-title{font-family:var(--f-disp);font-size:38px;font-style:italic;color:var(--paper);line-height:1.1}
.explore-sub{font-size:13px;color:var(--ash);margin-top:6px}
.explore-search{padding:14px 16px 0}
.explore-input{width:100%;padding:13px 16px;border:1.5px solid var(--paper3);border-radius:100px;background:white;font-family:'DM Sans',system-ui,sans-serif;font-size:14px;color:var(--ink);outline:none;transition:border-color .18s}
.explore-input:focus{border-color:var(--fire)}
.explore-input::placeholder{color:var(--stone)}
.explore-filters{display:flex;gap:8px;padding:10px 16px 0;overflow-x:auto;scrollbar-width:none}
.explore-filters::-webkit-scrollbar{display:none}
.filter-chip{padding:7px 15px;border-radius:100px;flex-shrink:0;border:1.5px solid var(--paper3);background:white;font-size:12px;font-weight:600;color:var(--ash);cursor:pointer;transition:all .15s}
.filter-chip.on{border-color:var(--fire-rim);background:var(--fire-bg);color:var(--fire-d)}
.recipe-count{font-size:12px;color:var(--stone);padding:10px 20px 2px;font-weight:500}
.recipe-grid{padding:8px 16px 0;display:flex;flex-direction:column;gap:10px}
.grid-item{background:white;border-radius:var(--r-lg);border:1px solid var(--paper3);display:flex;align-items:stretch;overflow:hidden;box-shadow:var(--sh);cursor:pointer;transition:all .15s}
.grid-item:active{transform:scale(.99);box-shadow:none}
.grid-emoji{width:72px;background:var(--ink);display:flex;align-items:center;justify-content:center;font-size:32px;flex-shrink:0}
.grid-content{flex:1;padding:13px 12px 13px 16px;min-width:0}
.grid-name{font-family:var(--f-disp);font-size:16px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.grid-meta{font-size:11px;color:var(--stone);display:flex;gap:8px;flex-wrap:wrap;margin-bottom:5px}
.grid-tags{display:flex;gap:5px;flex-wrap:wrap}
.grid-tag{padding:2px 8px;border-radius:100px;background:var(--paper2);font-size:10px;font-weight:600;color:var(--ash)}
.grid-side{display:flex;align-items:center;padding:0 12px 0 0;flex-shrink:0}
.heart-btn{width:34px;height:34px;border-radius:50%;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.heart-btn:active{transform:scale(.9)}
.heart-btn svg{width:20px;height:20px;stroke:var(--stone);fill:none;stroke-width:2;stroke-linecap:round;transition:all .15s}
.heart-btn.saved svg{stroke:var(--fire);fill:var(--fire)}
/* SAVED */
.saved-header{background:var(--ink);padding:54px 24px 28px;position:relative;overflow:hidden}
.saved-header::before{content:'';position:absolute;top:-80px;left:-80px;width:260px;height:260px;border-radius:50%;background:radial-gradient(circle,rgba(216,90,48,.1) 0%,transparent 65%);pointer-events:none}
.saved-eyebrow{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.12em;color:var(--fire);margin-bottom:10px}
.saved-title{font-family:var(--f-disp);font-size:38px;font-style:italic;color:var(--paper);line-height:1.1}
.saved-count{font-size:13px;color:var(--ash);margin-top:6px}
.empty-state{text-align:center;padding:52px 32px;display:flex;flex-direction:column;align-items:center;gap:14px}
.empty-emoji{font-size:52px}
.empty-title{font-family:var(--f-disp);font-size:24px;font-style:italic;color:var(--ink)}
.empty-sub{font-size:14px;color:var(--ash);line-height:1.6;max-width:260px}
/* SHEET */
.sheet-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s ease;max-width:430px;left:50%;transform:translateX(-50%)}
.sheet-backdrop.open{opacity:1;pointer-events:all}
.detail-sheet{background:var(--paper);border-radius:24px 24px 0 0;max-height:92dvh;overflow-y:auto;-webkit-overflow-scrolling:touch;width:100%;transform:translateY(100%);transition:transform .38s cubic-bezier(.4,0,.2,1)}
.sheet-backdrop.open .detail-sheet{transform:translateY(0)}
.sheet-handle{display:flex;justify-content:center;padding:14px 0 0}
.sheet-handle span{width:38px;height:4px;border-radius:2px;background:var(--paper3);display:block}
.sheet-hero{background:var(--ink);padding:20px 24px 28px;position:relative;overflow:hidden}
.sheet-hero::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(216,90,48,.12) 0%,transparent 65%);pointer-events:none}
.sheet-close{position:absolute;top:16px;right:16px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.08);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center}
.sheet-close svg{width:18px;height:18px;stroke:rgba(255,255,255,.7);stroke-width:2;fill:none;stroke-linecap:round}
.sheet-emoji{font-size:52px;margin-bottom:14px;display:block}
.sheet-name{font-family:var(--f-disp);font-size:28px;font-style:italic;color:var(--paper);line-height:1.2;margin-bottom:12px}
.sheet-chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:0}
.sheet-chip{padding:5px 13px;border-radius:100px;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.14);font-size:12px;font-weight:600;color:rgba(255,255,255,.75)}
.sheet-body{padding:24px 20px 32px}
.sheet-desc{font-size:15px;color:var(--ash);line-height:1.7;margin-bottom:24px}
.sheet-save-btn{width:100%;padding:14px;border-radius:var(--r-lg);border:none;background:var(--fire);color:white;font-family:'DM Sans',system-ui,sans-serif;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;box-shadow:0 4px 12px var(--fire-glow);transition:all .18s}
.sheet-save-btn.saved{background:var(--green);box-shadow:none}
.sheet-save-btn svg{width:18px;height:18px;stroke:white;fill:none;stroke-width:2;stroke-linecap:round}
/* INSTALL */
.install-banner{display:none;align-items:center;gap:12px;margin:12px 16px 0;padding:12px 16px;border-radius:var(--r-md);background:var(--ink);color:var(--paper);cursor:pointer}
.install-banner.visible{display:flex}
.install-banner svg{width:20px;height:20px;stroke:var(--fire);stroke-width:2;fill:none;flex-shrink:0}
.ib-text{flex:1}.ib-title{font-size:13px;font-weight:600}.ib-sub{font-size:11px;opacity:.6;margin-top:1px}
.ib-close{opacity:.5;font-size:20px;padding:0 4px}
</style>
</head>
<body>
<div class="app">
<div class="toast" id="toast"></div>

<!-- SHEET -->
<div class="sheet-backdrop" id="sheetBackdrop" onclick="maybeClose(event)">
  <div class="detail-sheet">
    <div class="sheet-handle"><span></span></div>
    <div class="sheet-hero">
      <button class="sheet-close" onclick="closeSheet()"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      <span class="sheet-emoji" id="sEmoji">🍽️</span>
      <div class="sheet-name" id="sName"></div>
      <div class="sheet-chips" id="sChips"></div>
    </div>
    <div class="sheet-body">
      <p class="sheet-desc" id="sDesc"></p>
      <div class="sec-head">Ingrédients</div>
      <div class="ing-wrap" id="sIngs" style="margin-bottom:24px"></div>
      <div class="sec-head">Préparation</div>
      <div class="steps-list" id="sSteps" style="margin-bottom:20px"></div>
      <button class="sheet-save-btn" id="sheetSaveBtn" onclick="sheetSave()">
        <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        Sauvegarder
      </button>
    </div>
  </div>
</div>

<div class="screens">

<!-- HOME -->
<div id="screen-home" class="screen active">
  <div class="home-hero">
    <div class="hero-eyebrow" id="heroDate">…</div>
    <div class="hero-title">Que cuisinez-vous<br>aujourd'hui ?</div>
    <div class="hero-sub" id="heroCount">Plus de 500 recettes • Fonctionne hors-ligne</div>
    <div class="hero-fade"></div>
  </div>
  <div id="installBanner" class="install-banner">
    <svg viewBox="0 0 24 24"><path d="M12 2v13M8 11l4 4 4-4"/><path d="M20 17v2a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-2"/></svg>
    <div class="ib-text"><div class="ib-title">Installer l'application</div><div class="ib-sub">Accès rapide depuis l'écran d'accueil</div></div>
    <span class="ib-close" onclick="dismissInstall(event)">✕</span>
  </div>
  <div class="search-wrap">
    <div class="search-row">
      <input class="kw-input" id="kwInput" type="text" placeholder="Rechercher un ingrédient, un plat…" oninput="filterHome()">
      <button class="shuf-btn" onclick="shuffle()" aria-label="Recette aléatoire">
        <svg viewBox="0 0 24 24"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
      </button>
    </div>
  </div>
  <div class="tags-row" id="homeTags">
    <button class="tag" onclick="pickTag(this,'')">✨ Toutes</button>
    <button class="tag" onclick="pickTag(this,'Végétarien')">🥦 Végétarien</button>
    <button class="tag" onclick="pickTag(this,'Rapide')">⚡ Rapide</button>
    <button class="tag" onclick="pickTag(this,'Italien')">🇮🇹 Italien</button>
    <button class="tag" onclick="pickTag(this,'Asiatique')">🥢 Asiatique</button>
    <button class="tag" onclick="pickTag(this,'Français')">🥖 Français</button>
    <button class="tag" onclick="pickTag(this,'Dessert')">🍰 Dessert</button>
    <button class="tag" onclick="pickTag(this,'Healthy')">💚 Healthy</button>
    <button class="tag" onclick="pickTag(this,'Épicé')">🌶️ Épicé</button>
    <button class="tag" onclick="pickTag(this,'Sans gluten')">🌾 Sans gluten</button>
    <button class="tag" onclick="pickTag(this,'Vegan')">🌿 Vegan</button>
  </div>
  <div id="recipeArea"></div>
</div>

<!-- EXPLORE -->
<div id="screen-explore" class="screen">
  <div class="explore-header">
    <div class="saved-eyebrow">Catalogue</div>
    <div class="explore-title">Explorer</div>
    <div class="explore-sub" id="exploreCount">…</div>
  </div>
  <div class="explore-search">
    <input class="explore-input" id="exploreInput" type="text" placeholder="Rechercher…" oninput="renderExplore()">
  </div>
  <div class="explore-filters" id="exploreFilters">
    <button class="filter-chip on" onclick="pickFilter(this,'')">Toutes</button>
    <button class="filter-chip" onclick="pickFilter(this,'Végétarien')">🥦 Végétarien</button>
    <button class="filter-chip" onclick="pickFilter(this,'Vegan')">🌿 Vegan</button>
    <button class="filter-chip" onclick="pickFilter(this,'Rapide')">⚡ Rapide</button>
    <button class="filter-chip" onclick="pickFilter(this,'Italien')">🇮🇹 Italien</button>
    <button class="filter-chip" onclick="pickFilter(this,'Asiatique')">🥢 Asiatique</button>
    <button class="filter-chip" onclick="pickFilter(this,'Français')">🥖 Français</button>
    <button class="filter-chip" onclick="pickFilter(this,'Dessert')">🍰 Dessert</button>
    <button class="filter-chip" onclick="pickFilter(this,'Healthy')">💚 Healthy</button>
    <button class="filter-chip" onclick="pickFilter(this,'Épicé')">🌶️ Épicé</button>
    <button class="filter-chip" onclick="pickFilter(this,'Sans gluten')">🌾 Sans gluten</button>
  </div>
  <div class="recipe-count" id="exploreCountLabel"></div>
  <div class="recipe-grid" id="exploreGrid"></div>
</div>

<!-- SAVED -->
<div id="screen-saved" class="screen">
  <div class="saved-header">
    <div class="saved-eyebrow">Mes recettes</div>
    <div class="saved-title">Coups de cœur</div>
    <div class="saved-count" id="savedCount">Aucune recette sauvegardée</div>
  </div>
  <div id="savedContainer"></div>
</div>

/* ══════════════════════════════════════════════

const RECIPES = [
/* PÂTES & RIZ */
{id:1,emoji:"🍝",name:"Spaghetti Carbonara",tags:["Italien","Rapide"],time:"20 min",diff:"Facile",srv:"4 pers",cal:"620 kcal",desc:"Un classique romain onctueux et généreux. Les œufs et le pecorino forment une sauce crémeuse sans crème ajoutée.",ing:["400g de spaghetti","200g de guanciale ou lardons","4 jaunes d'œufs","80g de pecorino râpé","Poivre noir concassé","Sel"],steps:["Faire cuire les pâtes al dente dans une grande casserole d'eau bouillante salée.","Faire revenir le guanciale à feu moyen jusqu'à ce qu'il soit croustillant. Réserver la graisse.","Dans un bol, mélanger les jaunes d'œufs avec le pecorino et beaucoup de poivre noir.","Égoutter les pâtes en conservant une louche d'eau de cuisson. Mélanger hors du feu avec le guanciale.","Ajouter le mélange œufs-fromage en remuant vivement. Détendre avec l'eau de cuisson pour obtenir une sauce soyeuse.","Servir immédiatement avec du pecorino supplémentaire et du poivre."]},
{id:2,emoji:"🍜",name:"Ramen au miso",tags:["Asiatique","Réconfortant"],time:"45 min",diff:"Moyen",srv:"2 pers",cal:"540 kcal",desc:"Un bouillon riche et profond au miso blanc, avec des ramen moelleux et des garnitures généreuses.",ing:["200g de ramen frais","3 c. à s. de miso blanc","1L de bouillon de poulet","100g de porc rôti ou tofu","2 œufs mollets","Maïs, algues nori, oignon vert","1 c. à s. de beurre","Sauce soja"],steps:["Faire cuire les œufs 7 minutes dans l'eau bouillante, refroidir et écaler.","Chauffer le bouillon à feu doux. Délayer le miso avec un peu de bouillon chaud.","Incorporer le miso au bouillon, ajouter le beurre et la sauce soja. Ne pas faire bouillir.","Cuire les ramen selon les instructions.","Répartir les ramen dans les bols, verser le bouillon chaud.","Garnir avec le porc tranché, l'œuf mollet coupé, le maïs, les algues et l'oignon vert."]},
{id:3,emoji:"🍛",name:"Risotto aux champignons",tags:["Italien","Végétarien","Réconfortant"],time:"35 min",diff:"Moyen",srv:"4 pers",cal:"490 kcal",desc:"Un risotto crémeux aux champignons sauvages, parfumé au thym et au parmesan fondant.",ing:["300g de riz arborio","500g de champignons mélangés","1 oignon","2 gousses d'ail","150ml de vin blanc","1L de bouillon de légumes chaud","80g de parmesan râpé","40g de beurre","Thym frais","Huile d'olive"],steps:["Faire revenir l'oignon et l'ail dans l'huile d'olive. Ajouter les champignons et cuire 8 minutes.","Ajouter le riz et nacrer 2 minutes en remuant.","Verser le vin blanc et laisser absorber en remuant.","Ajouter le bouillon chaud louche par louche, en remuant constamment pendant 18 minutes.","Retirer du feu, incorporer le beurre et le parmesan (mantecatura).","Couvrir 2 minutes, servir avec du thym frais."]},
{id:4,emoji:"🍝",name:"Pâtes all'Arrabbiata",tags:["Italien","Végétarien","Épicé","Rapide"],time:"20 min",diff:"Facile",srv:"4 pers",cal:"420 kcal",desc:"Une sauce tomate vibrante et relevée, parfumée à l'ail et au piment. Simple, rapide et diablement bonne.",ing:["400g de penne","400g de tomates pelées en boîte","4 gousses d'ail","2 piments rouges","Huile d'olive","Persil plat","Sel"],steps:["Faire chauffer l'huile à feu moyen. Faire revenir l'ail émincé et le piment 2 minutes.","Ajouter les tomates écrasées. Cuire 15 minutes à feu vif en écrasant.","Assaisonner généreusement.","Cuire les penne al dente.","Mélanger les pâtes avec la sauce. Ajouter un peu d'eau de cuisson si besoin.","Servir avec du persil frais et un filet d'huile d'olive."]},
{id:5,emoji:"🥘",name:"Paella valenciana",tags:["Espagnol","Fruits de mer"],time:"55 min",diff:"Difficile",srv:"6 pers",cal:"580 kcal",desc:"La vraie paella valencienne avec ses crevettes, moules et chorizo, parfumée au safran et au paprika.",ing:["400g de riz bomba ou paella","500g de crevettes","500g de moules","200g de chorizo","1 poivron rouge","1 oignon","3 tomates","1L de bouillon de poisson","Safran","Paprika fumé","Huile d'olive"],steps:["Faire revenir le chorizo en rondelles. Réserver.","Dans la paellera, faire revenir l'oignon, le poivron et les tomates 10 minutes.","Ajouter le riz, le paprika et le safran. Nacrer 2 minutes.","Verser le bouillon chaud, répartir uniformément. Cuire 15 minutes sans remuer.","Disposer les crevettes et moules. Cuire encore 10 minutes.","Laisser reposer 5 minutes. Servir avec du citron."]},
{id:6,emoji:"🍜",name:"Pad Thaï",tags:["Asiatique","Rapide"],time:"25 min",diff:"Facile",srv:"2 pers",cal:"510 kcal",desc:"Le célèbre wok thaïlandais avec ses nouilles de riz sautées, ses crevettes et sa sauce sucrée-acidulée.",ing:["200g de nouilles de riz","200g de crevettes","2 œufs","100g de germes de soja","3 oignons verts","50g de cacahuètes grillées","3 c. à s. de sauce de poisson","2 c. à s. de sauce tamarin","1 c. à s. de sucre","1 citron vert","Huile"],steps:["Tremper les nouilles dans l'eau tiède 20 minutes. Égoutter.","Mélanger sauce de poisson, tamarin et sucre.","Dans un wok très chaud, faire sauter les crevettes 2 minutes. Réserver.","Brouiller les œufs dans le wok. Ajouter les nouilles et la sauce.","Incorporer les crevettes, les germes de soja et les oignons verts.","Servir avec les cacahuètes concassées et le citron vert."]},
{id:7,emoji:"🍛",name:"Curry de lentilles corail",tags:["Indien","Vegan","Végétarien","Healthy","Sans gluten"],time:"30 min",diff:"Facile",srv:"4 pers",cal:"380 kcal",desc:"Un dal crémeux et parfumé, réconfortant et nourrissant. La simplicité indienne à son meilleur.",ing:["300g de lentilles corail","400ml de lait de coco","1 boîte de tomates concassées","1 oignon","3 gousses d'ail","1 c. à c. de gingembre râpé","2 c. à c. de curry","1 c. à c. de curcuma","Cumin","Coriandre fraîche","Huile de coco"],steps:["Rincer les lentilles. Faire revenir l'oignon, l'ail et le gingembre dans l'huile.","Ajouter les épices et faire revenir 1 minute.","Incorporer les lentilles, les tomates et 500ml d'eau. Cuire 15 minutes.","Ajouter le lait de coco et cuire encore 10 minutes.","Ajuster l'assaisonnement. La texture doit être crémeuse.","Servir avec du riz basmati et de la coriandre fraîche."]},
{id:8,emoji:"🍝",name:"Lasagne à la bolognaise",tags:["Italien","Réconfortant"],time:"90 min",diff:"Difficile",srv:"6 pers",cal:"680 kcal",desc:"La lasagne classique italienne avec une bolognaise mijotée et une béchamel onctueuse.",ing:["12 feuilles de lasagne","400g de bœuf haché","200g de porc haché","400g de tomates concassées","1 oignon","2 carottes","2 branches de céleri","150ml de vin rouge","500ml de lait","50g de beurre","50g de farine","200g de parmesan","Noix de muscade"],steps:["Bolognaise : faire revenir les légumes, ajouter les viandes. Dorer, verser le vin, puis les tomates. Mijoter 45 minutes.","Béchamel : faire fondre le beurre, ajouter la farine, cuire 2 min. Incorporer le lait en fouettant. Assaisonner avec muscade.","Préchauffer le four à 180°C.","Alterner : béchamel, pâtes, bolognaise, parmesan. Recommencer 3 fois.","Terminer par de la béchamel et du parmesan.","Cuire 40 minutes. Laisser reposer 10 minutes avant de servir."]},
/* VIANDES */
{id:9,emoji:"🥩",name:"Bœuf bourguignon",tags:["Français","Réconfortant"],time:"180 min",diff:"Moyen",srv:"6 pers",cal:"620 kcal",desc:"Le grand classique de la cuisine française. Un bœuf tendre mijoté dans le vin rouge, avec lardons et champignons.",ing:["1.5kg de bœuf à braiser","200g de lardons","500ml de bourgogne rouge","300g de champignons","2 carottes","1 oignon","3 gousses d'ail","Bouquet garni","2 c. à s. de farine","Huile","Sel, poivre"],steps:["Couper le bœuf en gros cubes. Faire dorer en plusieurs fois dans l'huile bien chaude.","Faire revenir les lardons, les carottes et l'oignon. Saupoudrer de farine.","Remettre la viande, verser le vin. Ajouter l'ail et le bouquet garni.","Couvrir et mijoter 2h30 à feu très doux ou au four à 160°C.","Faire sauter les champignons séparément. Ajouter 30 minutes avant la fin.","Rectifier l'assaisonnement. Servir avec des pommes de terre vapeur."]},
{id:10,emoji:"🍗",name:"Poulet rôti au citron et romarin",tags:["Français","Rapide","Sans gluten"],time:"70 min",diff:"Facile",srv:"4 pers",cal:"450 kcal",desc:"Un poulet rôti parfumé au citron confit et au romarin frais. La peau croustillante, la chair juteuse.",ing:["1 poulet entier (1.5kg)","2 citrons","4 branches de romarin","6 gousses d'ail","40g de beurre mou","Huile d'olive","Sel, poivre"],steps:["Préchauffer le four à 200°C.","Mélanger le beurre avec le zeste d'un citron, le romarin haché, sel et poivre.","Glisser le beurre parfumé sous la peau du poulet.","Frotter l'extérieur avec l'huile, saler et poivrer généreusement.","Farcir la cavité avec les citrons coupés en deux, l'ail et le romarin restant.","Rôtir 1h10 en arrosant toutes les 20 minutes. Laisser reposer 10 minutes."]},
{id:11,emoji:"🥩",name:"Steak frites maison",tags:["Français","Rapide"],time:"25 min",diff:"Facile",srv:"2 pers",cal:"720 kcal",desc:"Un steak saignant avec des frites maison croustillantes et une sauce au poivre onctueuse.",ing:["2 entrecôtes (250g chacune)","4 grosses pommes de terre","100ml de crème fraîche","2 c. à s. de cognac","Poivre concassé","Beurre","Huile de friture","Sel"],steps:["Couper les pommes de terre en bâtonnets. Rincer et sécher soigneusement.","Frire une première fois à 150°C pendant 5 minutes. Égoutter.","Saisir les steaks dans une poêle très chaude avec beurre et huile. 2 min par face pour saignant.","Retirer les steaks, déglacer avec le cognac, ajouter le poivre et la crème. Réduire 2 minutes.","Refaire les frites à 180°C pendant 3 minutes jusqu'à dorure. Saler immédiatement.","Servir avec la sauce au poivre et du cresson."]},
{id:12,emoji:"🍖",name:"Tajine d'agneau aux pruneaux",tags:["Marocain","Réconfortant"],time:"120 min",diff:"Moyen",srv:"4 pers",cal:"580 kcal",desc:"Un tajine fondant et parfumé, la douceur des pruneaux se marie à la richesse des épices marocaines.",ing:["1kg d'épaule d'agneau","200g de pruneaux","2 oignons","3 gousses d'ail","1 c. à c. de cannelle","1 c. à c. de gingembre","1 c. à c. de curcuma","2 c. à s. de miel","Coriandre fraîche","Amandes effilées","Huile d'olive"],steps:["Couper l'agneau en morceaux. Faire dorer dans l'huile.","Ajouter les oignons émincés et les épices. Cuire 5 minutes.","Verser 300ml d'eau, couvrir et cuire à feu doux 1h30.","Ajouter les pruneaux et le miel 20 minutes avant la fin.","Faire griller les amandes à sec.","Servir avec de la semoule, garnir de coriandre et d'amandes."]},
{id:13,emoji:"🍗",name:"Poulet tikka masala",tags:["Indien","Épicé"],time:"45 min",diff:"Moyen",srv:"4 pers",cal:"490 kcal",desc:"Le curry britannique préféré ! Des morceaux de poulet marinés et grillés dans une sauce tomate crémeuse.",ing:["700g de blanc de poulet","200ml de yaourt nature","400ml de lait de coco","400g de tomates concassées","1 oignon","3 gousses d'ail","Gingembre","Garam masala","Paprika","Curcuma","Crème fraîche"],steps:["Mariner le poulet dans le yaourt avec les épices pendant 30 minutes minimum.","Griller le poulet au four à 220°C pendant 15 minutes.","Faire revenir l'oignon, l'ail et le gingembre. Ajouter les épices.","Incorporer les tomates et le lait de coco. Mijoter 15 minutes.","Ajouter le poulet grillé et la crème. Cuire encore 10 minutes.","Servir avec du riz basmati et du naan."]},
{id:14,emoji:"🥩",name:"Côte de porc à la moutarde",tags:["Français","Rapide"],time:"20 min",diff:"Facile",srv:"2 pers",cal:"430 kcal",desc:"Une côte de porc tendre nappée d'une sauce à la moutarde à l'ancienne et à la crème.",ing:["2 côtes de porc","3 c. à s. de moutarde à l'ancienne","150ml de crème fraîche","1 échalote","1 verre de vin blanc","Beurre","Thym","Sel, poivre"],steps:["Saisir les côtes de porc dans le beurre mousseux, 4 minutes par face. Saler, poivrer.","Réserver les côtes sous du papier aluminium.","Faire revenir l'échalote dans le même poêlon. Déglacer au vin blanc.","Ajouter la crème et la moutarde. Réduire à feu moyen 3 minutes.","Remettre les côtes dans la sauce. Chauffer 2 minutes.","Servir avec des haricots verts et des pommes de terre sautées."]},
/* SOUPES */
{id:15,emoji:"🍲",name:"Soupe à l'oignon gratinée",tags:["Français","Végétarien","Réconfortant"],time:"60 min",diff:"Facile",srv:"4 pers",cal:"380 kcal",desc:"La soupe parisienne par excellence. Les oignons caramélisés et le gruyère gratiné vous réchaufferont le cœur.",ing:["1kg d'oignons","1.5L de bouillon de bœuf","200ml de vin blanc","8 tranches de baguette","200g de gruyère râpé","2 c. à s. de beurre","1 c. à s. d'huile","Thym","Laurier","Sel, poivre"],steps:["Émincer finement les oignons. Les faire fondre dans le beurre et l'huile 40 minutes à feu doux, en remuant souvent jusqu'à caramélisation.","Déglacer au vin blanc. Laisser réduire.","Ajouter le bouillon, le thym et le laurier. Cuire 15 minutes.","Faire griller les tranches de baguette.","Répartir la soupe dans des bols allant au four. Déposer le pain, recouvrir de gruyère.","Gratiner sous le gril 5 minutes jusqu'à dorure."]},
{id:16,emoji:"🥣",name:"Velouté de butternut",tags:["Végétarien","Vegan","Healthy","Automne"],time:"40 min",diff:"Facile",srv:"4 pers",cal:"220 kcal",desc:"Un velouté soyeux et doux, parfumé au gingembre et à la noix de muscade. Le réconfort de l'automne.",ing:["1 courge butternut (1kg)","1 oignon","2 gousses d'ail","1 c. à c. de gingembre frais","800ml de bouillon de légumes","200ml de lait de coco","Noix de muscade","Huile d'olive","Graines de courge pour garnir"],steps:["Éplucher et couper la butternut en cubes. Émincer l'oignon et l'ail.","Faire revenir l'oignon et l'ail dans l'huile 5 minutes.","Ajouter la butternut, le gingembre et le bouillon. Couvrir et cuire 25 minutes.","Mixer finement avec le lait de coco.","Assaisonner avec la muscade, le sel et le poivre.","Servir avec des graines de courge grillées et un filet d'huile."]},
{id:17,emoji:"🍵",name:"Pho bœuf vietnamien",tags:["Asiatique","Réconfortant"],time:"180 min",diff:"Moyen",srv:"4 pers",cal:"420 kcal",desc:"Le bouillon légendaire du Vietnam, longuement mijoté avec des épices et servi avec des herbes fraîches.",ing:["800g de bœuf (plat de côte)","200g de bœuf cru tranché fin","200g de nouilles de riz","2 oignons","5cm de gingembre","3 anis étoilés","1 bâton de cannelle","Sauce nuoc-mâm","Pousses de soja","Basilic thaï","Citron vert","Piment"],steps:["Faire griller les oignons et le gingembre directement sur la flamme.","Dans une grande casserole, faire bouillir le bœuf 5 minutes, jeter l'eau.","Couvrir d'eau froide, ajouter les oignons, gingembre, épices. Mijoter 2h30.","Passer le bouillon au chinois. Assaisonner avec le nuoc-mâm.","Cuire les nouilles. Disposer dans les bols avec les herbes et les pousses.","Verser le bouillon bouillant sur les tranches de bœuf cru pour les cuire."]},
{id:18,emoji:"🥣",name:"Gaspacho andalou",tags:["Espagnol","Vegan","Végétarien","Healthy","Été"],time:"15 min",diff:"Facile",srv:"4 pers",cal:"160 kcal",desc:"La soupe froide espagnole par excellence. Fraîche, vitaminée et absolument irrésistible en été.",ing:["1kg de tomates mûres","1 concombre","1 poivron rouge","1 gousse d'ail","1 tranche de pain rassis","4 c. à s. d'huile d'olive","2 c. à s. de vinaigre de Xérès","Sel","Eau froide"],steps:["Tremper le pain dans l'eau froide 5 minutes.","Peler et épépiner les tomates. Couper grossièrement tous les légumes.","Mixer tomates, concombre, poivron, ail et pain essoré.","Ajouter l'huile, le vinaigre et assaisonner.","Mixer finement et passer au tamis pour une texture soyeuse.","Réfrigérer au moins 2 heures. Servir avec des dés de légumes et un filet d'huile."]},
/* POISSONS */
{id:19,emoji:"🐟",name:"Saumon teriyaki",tags:["Asiatique","Rapide","Healthy","Sans gluten"],time:"20 min",diff:"Facile",srv:"2 pers",cal:"410 kcal",desc:"Des pavés de saumon laqués au teriyaki maison, brillants et savoureux, avec une pointe de sésame.",ing:["2 pavés de saumon","4 c. à s. de sauce soja","2 c. à s. de mirin","2 c. à s. de saké ou vin blanc","1 c. à s. de sucre","Graines de sésame","Oignon vert","Huile"],steps:["Mélanger sauce soja, mirin, saké et sucre dans une petite casserole. Réduire 3 minutes jusqu'à épaississement.","Faire chauffer l'huile dans une poêle. Saisir le saumon côté peau 3 minutes.","Retourner et saisir 2 minutes. La chair doit rester rosée.","Napper le saumon de sauce teriyaki pendant la cuisson.","Laisser légèrement caraméliser.","Servir sur du riz avec les graines de sésame et l'oignon vert émincé."]},
{id:20,emoji:"🦐",name:"Crevettes à l'ail et au beurre",tags:["Rapide","Sans gluten","Fruits de mer"],time:"15 min",diff:"Facile",srv:"2 pers",cal:"320 kcal",desc:"Des crevettes juteuses sautées dans un beurre à l'ail parfumé et au persil. Prêt en un quart d'heure.",ing:["400g de grosses crevettes décortiquées","4 gousses d'ail","50g de beurre","Persil plat","1/2 citron","Piment d'Espelette","Sel"],steps:["Sécher les crevettes avec du papier absorbant.","Faire fondre le beurre à feu vif. Ajouter l'ail émincé et faire revenir 30 secondes.","Ajouter les crevettes en une seule couche. Saisir 1 minute par face.","Assaisonner avec le piment d'Espelette et le sel.","Presser le citron, ajouter le persil haché.","Servir immédiatement avec du pain croustillant ou des linguine."]},
{id:21,emoji:"🐟",name:"Brandade de morue",tags:["Français","Réconfortant"],time:"60 min",diff:"Moyen",srv:"4 pers",cal:"450 kcal",desc:"La brandade nimoise, un plat de morue effilochée et de pommes de terre, onctueux et réconfortant.",ing:["500g de morue salée","500g de pommes de terre","200ml d'huile d'olive","200ml de crème chaude","3 gousses d'ail","Noix de muscade","Poivre","Pain grillé"],steps:["Dessaler la morue 24h en changeant l'eau 3 fois.","Pocher la morue dans l'eau frémissante 15 minutes. Effiler en éliminant peau et arêtes.","Cuire les pommes de terre à l'eau. Écraser finement.","Dans une casserole à feu doux, travailler la morue avec l'ail. Incorporer alternativement l'huile et la crème chaude.","Mélanger avec la purée. Assaisonner avec muscade et poivre.","Gratiner au four 15 minutes. Servir avec des croûtons à l'ail."]},
{id:22,emoji:"🦑",name:"Calamars à la plancha",tags:["Espagnol","Rapide","Healthy","Sans gluten"],time:"15 min",diff:"Facile",srv:"2 pers",cal:"240 kcal",desc:"Des calamars tendres et légèrement caramélisés sur la plancha, avec une vinaigrette à l'ail et au persil.",ing:["500g de calamars nettoyés","3 gousses d'ail","Persil plat","1 citron","Huile d'olive","Piment","Sel, poivre"],steps:["Inciser les calamars en quadrillage pour éviter qu'ils ne roulent.","Mélanger ail haché, persil, huile et citron pour la vinaigrette.","Faire chauffer la plancha ou une poêle en fonte à feu très vif.","Saisir les calamars 1 à 2 minutes par face avec un filet d'huile.","Assaisonner immédiatement.","Arroser de vinaigrette et servir avec du pain croustillant."]},
/* VÉGÉTARIEN / VEGAN */
{id:23,emoji:"🧀",name:"Gratin dauphinois",tags:["Français","Végétarien","Réconfortant"],time:"80 min",diff:"Facile",srv:"6 pers",cal:"520 kcal",desc:"Le roi des gratins ! Des pommes de terre fondantes dans une crème parfumée à l'ail et à la muscade.",ing:["1.2kg de pommes de terre","500ml de crème fraîche","250ml de lait entier","2 gousses d'ail","Noix de muscade","Beurre","Sel, poivre"],steps:["Préchauffer le four à 170°C. Frotter le plat avec l'ail coupé en deux, beurrer.","Éplucher et trancher finement les pommes de terre (2mm) sans les rincer.","Porter la crème, le lait, l'ail pressé, le sel, le poivre et la muscade à frémissement.","Disposer les pommes de terre en couches, verser le liquide chaud dessus.","Cuire 1h15 jusqu'à ce que la surface soit dorée et les pommes de terre fondantes.","Laisser reposer 10 minutes avant de servir."]},
{id:24,emoji:"🥗",name:"Buddha bowl protéiné",tags:["Healthy","Vegan","Végétarien","Sans gluten"],time:"20 min",diff:"Facile",srv:"2 pers",cal:"480 kcal",desc:"Un bol complet et coloré avec du quinoa, des légumes rôtis, du houmous et une vinaigrette au tahini.",ing:["150g de quinoa","1 boîte de pois chiches","1 avocats","200g de tomates cerises","1 concombre","2 carottes","100g d'épinards","4 c. à s. de tahini","2 c. à s. de citron","1 gousse d'ail","Huile d'olive","Cumin","Paprika"],steps:["Cuire le quinoa selon les instructions. Laisser refroidir.","Égoutter les pois chiches, mélanger avec huile, cumin et paprika. Rôtir 20 min à 200°C.","Couper tous les légumes.","Vinaigrette : mixer tahini, citron, ail, eau et sel.","Assembler le bol : quinoa, légumes, pois chiches, avocat tranché.","Napper de vinaigrette tahini. Servir immédiatement."]},
{id:25,emoji:"🫕",name:"Ratatouille niçoise",tags:["Français","Vegan","Végétarien","Healthy","Été"],time:"60 min",diff:"Facile",srv:"4 pers",cal:"200 kcal",desc:"La ratatouille provençale traditionnelle, mijotée longuement pour concentrer tous les arômes de l'été.",ing:["2 courgettes","2 aubergines","3 tomates","2 poivrons","2 oignons","4 gousses d'ail","Herbes de Provence","Huile d'olive","Sel, poivre"],steps:["Couper tous les légumes en cubes de taille similaire.","Faire revenir les aubergines dans l'huile 10 minutes. Réserver.","Dans la même casserole, faire revenir les oignons et l'ail. Ajouter les poivrons.","Incorporer les courgettes, puis les tomates et les herbes.","Remettre les aubergines. Assaisonner.","Mijoter à découvert 35 minutes à feu doux en remuant de temps en temps."]},
{id:26,emoji:"🥙",name:"Falafels et sauce tahini",tags:["Moyen-Orient","Vegan","Végétarien","Épicé"],time:"30 min",diff:"Moyen",srv:"4 pers",cal:"380 kcal",desc:"Des falafels croustillants et parfumés au cumin et à la coriandre, servis avec une généreuse sauce tahini.",ing:["400g de pois chiches cuits","1 oignon","3 gousses d'ail","Persil et coriandre frais","1 c. à c. de cumin","1 c. à c. de coriandre moulue","Piment","Farine","Huile de friture","4 c. à s. de tahini","2 citrons","Sel"],steps:["Mixer les pois chiches avec l'oignon, l'ail, les herbes et les épices. La texture doit rester un peu granuleuse.","Ajouter la farine pour lier. Former des boulettes.","Réfrigérer 30 minutes pour que les falafels se tiennent mieux.","Frire à 180°C pendant 4 minutes jusqu'à dorure. Ou cuire au four à 200°C 25 minutes.","Préparer la sauce : mélanger tahini, jus de citron, ail et eau.","Servir dans un pain pita avec salade, tomates et sauce tahini."]},
{id:27,emoji:"🍕",name:"Pizza Margherita",tags:["Italien","Végétarien"],time:"45 min",diff:"Moyen",srv:"2 pers",cal:"560 kcal",desc:"La pizza napolitaine authentique : une pâte fine et croustillante, une sauce tomate simple et une mozzarella fondante.",ing:["300g de farine T00","5g de levure boulangère","180ml d'eau tiède","1 c. à c. de sel","1 c. à s. d'huile","200g de sauce tomate","200g de mozzarella fior di latte","Basilic frais","Huile d'olive"],steps:["Dissoudre la levure dans l'eau tiède. Mélanger avec la farine et le sel. Pétrir 10 minutes.","Ajouter l'huile, continuer à pétrir 5 minutes. Laisser lever 1h.","Étaler finement la pâte sur une surface farinée.","Déposer la sauce tomate, la mozzarella déchirée à la main.","Cuire à 250°C (four au maximum) pendant 10 minutes.","Sortir du four, ajouter le basilic frais et un filet d'huile d'olive."]},
{id:28,emoji:"🥘",name:"Chili sin carne",tags:["Mexicain","Vegan","Végétarien","Épicé","Sans gluten"],time:"40 min",diff:"Facile",srv:"4 pers",cal:"340 kcal",desc:"Un chili végétalien généreux et épicé, riche en légumineuses et en saveurs mexicaines.",ing:["2 boîtes de haricots rouges","1 boîte de maïs","400g de tomates concassées","2 poivrons","1 oignon","3 gousses d'ail","2 c. à c. de cumin","2 c. à c. de paprika fumé","Piment de Cayenne","Coriandre","Avocat","Huile d'olive"],steps:["Faire revenir l'oignon et l'ail dans l'huile.","Ajouter les poivrons coupés en dés. Cuire 5 minutes.","Incorporer les épices et cuire 1 minute.","Ajouter les tomates, les haricots égouttés et le maïs.","Mijoter 25 minutes à feu moyen. Rectifier l'assaisonnement.","Servir avec de l'avocat, de la coriandre fraîche et du citron vert."]},
{id:29,emoji:"🧆",name:"Shakshuka",tags:["Moyen-Orient","Végétarien","Épicé","Rapide"],time:"25 min",diff:"Facile",srv:"2 pers",cal:"320 kcal",desc:"Des œufs pochés dans une sauce tomate relevée aux poivrons et aux épices orientales. Un brunch spectaculaire.",ing:["4 œufs","400g de tomates concassées","2 poivrons rouges","1 oignon","3 gousses d'ail","1 c. à c. de cumin","1 c. à c. de paprika","Piment","Persil ou coriandre","Feta émiettée","Huile d'olive"],steps:["Faire revenir l'oignon et l'ail dans l'huile. Ajouter les poivrons coupés en lamelles.","Incorporer les épices et cuire 1 minute.","Verser les tomates, saler. Cuire 10 minutes jusqu'à épaississement.","Faire des puits dans la sauce et casser un œuf dans chacun.","Couvrir et cuire 5 minutes pour des œufs encore coulants.","Parsemer de feta et d'herbes. Servir avec du pain pita."]},
/* DESSERTS */
{id:30,emoji:"🍮",name:"Crème brûlée",tags:["Français","Dessert"],time:"50 min",diff:"Moyen",srv:"4 pers",cal:"420 kcal",desc:"Le dessert français emblématique : une crème vanillée soyeuse sous une fine couche de caramel craquant.",ing:["500ml de crème liquide entière","5 jaunes d'œufs","100g de sucre","1 gousse de vanille","Cassonade pour brûler"],steps:["Préchauffer le four à 150°C. Fendre la gousse de vanille et gratter les graines.","Chauffer la crème avec la vanille sans bouillir.","Fouetter les jaunes avec le sucre jusqu'à blanchissement. Incorporer la crème chaude.","Filtrer et verser dans les ramequins.","Cuire au bain-marie 35 minutes. Les crèmes doivent trembler légèrement.","Réfrigérer minimum 2 heures. Saupoudrer de cassonade et caraméliser au chalumeau."]},
{id:31,emoji:"🍫",name:"Fondant au chocolat",tags:["Français","Dessert","Rapide"],time:"20 min",diff:"Facile",srv:"6 pers",cal:"380 kcal",desc:"Le cœur coulant qui fait des ravages. Croustillant à l'extérieur, liquide à l'intérieur.",ing:["200g de chocolat noir 70%","150g de beurre","4 œufs","4 jaunes","130g de sucre","80g de farine","Beurre et cacao pour les moules"],steps:["Préchauffer le four à 200°C. Beurrer et fariner les moules.","Faire fondre le chocolat et le beurre au bain-marie.","Fouetter les œufs entiers, les jaunes et le sucre jusqu'à blanchissement.","Incorporer le mélange chocolat, puis la farine tamisée.","Verser dans les moules et cuire 11 minutes exactement.","Démouler immédiatement sur l'assiette. Servir avec de la glace vanille."]},
{id:32,emoji:"🥧",name:"Tarte Tatin",tags:["Français","Dessert"],time:"60 min",diff:"Moyen",srv:"6 pers",cal:"450 kcal",desc:"La tarte renversée aux pommes caramélisées, une erreur culinaire devenue légende.",ing:["1kg de pommes Golden","200g de sucre","80g de beurre","1 rouleau de pâte feuilletée","Crème fraîche pour servir"],steps:["Éplucher, épépiner et couper les pommes en quartiers.","Dans une poêle allant au four (ou moule à tatin), faire fondre le beurre et le sucre jusqu'au caramel.","Disposer les pommes serrées dans le caramel. Cuire 10 minutes à feu moyen.","Recouvrir d'un disque de pâte feuilletée en rentrant les bords.","Cuire au four à 200°C pendant 25 minutes.","Laisser tiédir 10 minutes avant de retourner sur le plat. Servir tiède avec de la crème."]},
{id:33,emoji:"🍮",name:"Île flottante",tags:["Français","Dessert"],time:"30 min",diff:"Moyen",srv:"4 pers",cal:"350 kcal",desc:"Des blancs en neige légers flottant sur une crème anglaise vanillée, nappés de caramel filant.",ing:["4 œufs","500ml de lait","120g de sucre","1 gousse de vanille","150g de sucre pour caramel","Amandes effilées grillées"],steps:["Séparer les blancs des jaunes.","Crème anglaise : chauffer lait et vanille, fouetter jaunes et 80g de sucre, incorporer le lait chaud, cuire à 82°C en remuant.","Monter les blancs en neige avec 40g de sucre.","Pocher des quenelles de blancs dans le lait frémissant, 2 minutes par face.","Faire un caramel avec 150g de sucre et un peu d'eau.","Servir les îles sur la crème anglaise froide, napper de caramel."]},
{id:34,emoji:"🧁",name:"Madeleine de Commercy",tags:["Français","Dessert","Rapide"],time:"25 min",diff:"Facile",srv:"12 madeleines",cal:"120 kcal",desc:"Les madeleines moelleuses avec leur bosse caractéristique, parfumées au citron et à la fleur d'oranger.",ing:["150g de farine","150g de sucre","3 œufs","100g de beurre fondu","1 zeste de citron","1 c. à c. de fleur d'oranger","1 c. à c. de levure","1 pincée de sel"],steps:["Fouetter les œufs et le sucre jusqu'à blanchissement.","Incorporer la farine, la levure et le sel.","Ajouter le beurre fondu tiède, le zeste et la fleur d'oranger.","Réfrigérer la pâte 1 heure (secret de la bosse).","Préchauffer le four à 220°C. Beurrer le moule à madeleines.","Remplir les alvéoles aux 3/4. Cuire 12 minutes. Démouler tiède."]},
{id:35,emoji:"🍰",name:"Cheesecake new-yorkais",tags:["Américain","Dessert"],time:"90 min",diff:"Moyen",srv:"8 pers",cal:"520 kcal",desc:"Le cheesecake crémeux à la new-yorkaise, sur une base de spéculoos, avec un coulis de fruits rouges.",ing:["600g de Philadelphia","200g de spéculoos","80g de beurre fondu","200ml de crème fraîche","3 œufs","150g de sucre","1 citron","Coulis de fruits rouges"],steps:["Mixer les spéculoos, mélanger avec le beurre. Tasser dans un moule à charnière.","Battre le Philadelphia avec le sucre et le zeste de citron.","Incorporer les œufs un par un, puis la crème.","Verser sur la base. Taper le moule pour enlever les bulles.","Cuire au four à 160°C pendant 60 minutes. Éteindre et laisser 30 minutes.","Réfrigérer une nuit. Démouler et servir avec le coulis."]},
{id:36,emoji:"🍩",name:"Churros au chocolat chaud",tags:["Espagnol","Dessert","Rapide"],time:"20 min",diff:"Facile",srv:"4 pers",cal:"480 kcal",desc:"Les churros frits croustillants, roulés dans le sucre à la cannelle et trempés dans un chocolat chaud épais.",ing:["200g de farine","250ml d'eau bouillante","1 pincée de sel","Huile de friture","Sucre et cannelle","200g de chocolat noir","300ml de lait","2 c. à s. de sucre","1 c. à c. de fécule"],steps:["Mélanger la farine et le sel. Verser l'eau bouillante en mélangeant vivement.","Mettre la pâte dans une poche à douille étoilée.","Faire chauffer l'huile à 180°C.","Dresser des bâtonnets de 10cm dans l'huile chaude. Frire 3 minutes jusqu'à dorure.","Rouler les churros chauds dans le mélange sucre-cannelle.","Chocolat chaud : faire fondre le chocolat dans le lait chaud avec le sucre et la fécule."]},
/* SALADES */
{id:37,emoji:"🥗",name:"Salade niçoise",tags:["Français","Healthy","Été","Sans gluten"],time:"20 min",diff:"Facile",srv:"4 pers",cal:"380 kcal",desc:"La salade niçoise traditionnelle avec thon, anchois, olives et œufs durs, un repas complet et coloré.",ing:["200g de thon en conserve","4 œufs durs","200g de haricots verts","4 tomates","1 poivron","100g d'olives noires","8 anchois","Laitue","Huile d'olive","Vinaigre","Basilic"],steps:["Cuire les haricots verts al dente. Rafraîchir.","Faire durcir les œufs 10 minutes. Écaler et couper en deux.","Couper les tomates, le poivron et effeuiller la laitue.","Disposer la laitue au fond du plat.","Arranger harmonieusement tous les ingrédients dessus.","Assaisonner avec huile d'olive, vinaigre et basilic."]},
{id:38,emoji:"🥙",name:"Salade César",tags:["Américain","Rapide"],time:"15 min",diff:"Facile",srv:"2 pers",cal:"420 kcal",desc:"La salade César avec sa sauce crémeuse à l'anchois, ses croûtons dorés et son parmesan en copeaux.",ing:["1 laitue romaine","100g de parmesan","2 tranches de pain","2 gousses d'ail","4 anchois","1 citron","1 c. à c. de moutarde","2 c. à s. de mayonnaise","Huile d'olive","Poivre"],steps:["Couper le pain en dés et les faire griller à l'ail dans l'huile.","Sauce : mixer anchois, ail, moutarde, mayonnaise, citron et huile.","Effeuiller et couper grossièrement la romaine.","Mélanger la salade avec la sauce.","Ajouter les croûtons et les copeaux de parmesan.","Poivrer généreusement et servir immédiatement."]},
/* PETIT-DÉJEUNER */
{id:39,emoji:"🥞",name:"Pancakes américains",tags:["Américain","Rapide","Petit-déjeuner"],time:"20 min",diff:"Facile",srv:"4 pers",cal:"350 kcal",desc:"Des pancakes moelleux et aériens, à déguster avec du sirop d'érable et des fruits frais.",ing:["200g de farine","2 c. à c. de levure","2 c. à s. de sucre","1 pincée de sel","2 œufs","250ml de lait","50g de beurre fondu","Sirop d'érable","Fruits frais"],steps:["Mélanger les ingrédients secs : farine, levure, sucre, sel.","Battre les œufs avec le lait et le beurre fondu.","Incorporer le mélange liquide aux poudres sans trop travailler.","Chauffer une poêle antiadhésive légèrement beurrée.","Verser une louche de pâte. Cuire jusqu'aux bulles, retourner, 1 minute.","Servir en pile avec le sirop d'érable et les fruits."]},
{id:40,emoji:"🍌",name:"Bowl açaï",tags:["Healthy","Vegan","Petit-déjeuner","Sans gluten"],time:"10 min",diff:"Facile",srv:"1 pers",cal:"290 kcal",desc:"Un bowl vibrant à l'açaï, épais et fruité, garni de granola, de fruits frais et de graines.",ing:["100g d'açaï surgelé","1 banane congelée","100g de myrtilles surgelées","60ml de lait végétal","2 c. à s. de granola","Fruits frais (banane, kiwi, fraises)","Graines de chia","Miel ou sirop d'agave"],steps:["Mixer l'açaï, la banane congelée et les myrtilles avec le lait végétal.","La texture doit être très épaisse — ajouter le minimum de liquide.","Verser dans un bol froid.","Disposer les garnitures en rangées : granola, fruits frais tranchés, graines de chia.","Arroser d'un filet de miel.","Consommer immédiatement avant que ça ne fonde."]},
/* SNACKS / APÉRO */
{id:41,emoji:"🥑",name:"Guacamole maison",tags:["Mexicain","Vegan","Végétarien","Rapide","Sans gluten","Apéro"],time:"10 min",diff:"Facile",srv:"4 pers",cal:"180 kcal",desc:"Un guacamole frais et authentique avec des avocats bien mûrs, du citron vert, du piment et de la coriandre.",ing:["3 avocats mûrs","2 citrons verts","1 piment vert","1/2 oignon rouge","2 tomates","Coriandre fraîche","Sel"],steps:["Couper les avocats en deux et récupérer la chair.","Écraser grossièrement à la fourchette — garder de la texture.","Presser les citrons verts immédiatement pour éviter l'oxydation.","Hacher finement le piment, l'oignon rouge, les tomates et la coriandre.","Mélanger et assaisonner.","Servir avec des chips de tortilla. Couvrir d'un film au contact pour conserver."]},
{id:42,emoji:"🧄",name:"Houmous maison",tags:["Moyen-Orient","Vegan","Végétarien","Healthy","Apéro"],time:"15 min",diff:"Facile",srv:"6 pers",cal:"150 kcal",desc:"Un houmous crémeux et parfumé au tahini et au citron, incomparablement meilleur que le commerce.",ing:["400g de pois chiches cuits","4 c. à s. de tahini","2 citrons","2 gousses d'ail","5 c. à s. d'huile d'olive","1/2 c. à c. de cumin","Eau glacée","Paprika","Sel"],steps:["Mixer le tahini avec le jus de citron pendant 1 minute — cela le rend plus crémeux.","Ajouter l'ail et le sel. Mixer encore.","Incorporer les pois chiches. Mixer longuement.","Ajouter l'eau glacée cuillère par cuillère pour la texture souhaitée.","Assaisonner avec le cumin et rectifier le sel.","Servir dans une assiette creuse avec un sillon, garnir d'huile et de paprika."]},
{id:43,emoji:"🫓",name:"Bruschetta aux tomates",tags:["Italien","Vegan","Végétarien","Rapide","Apéro"],time:"10 min",diff:"Facile",srv:"4 pers",cal:"200 kcal",desc:"La bruschetta romaine classique : une tomate fraîche au basilic sur du pain grillé frotté à l'ail.",ing:["1 baguette","4 tomates mûres","2 gousses d'ail","Basilic frais","Huile d'olive","Sel, poivre","Optionnel : burrata"],steps:["Couper la baguette en biais et faire griller au four ou au grille-pain.","Frotter chaque tranche avec une demi-gousse d'ail.","Couper les tomates en petits dés. Égoutter si nécessaire.","Mélanger les tomates avec le basilic déchiré, l'huile et l'assaisonnement.","Répartir les tomates sur les tartines.","Servir immédiatement. Optionnel : déposer un morceau de burrata."]},
/* CUISINE DU MONDE */
{id:44,emoji:"🌮",name:"Tacos al pastor",tags:["Mexicain","Épicé"],time:"40 min",diff:"Moyen",srv:"4 pers",cal:"480 kcal",desc:"Les tacos mexicains au porc mariné aux piments et aux épices, avec ananas et coriandre.",ing:["600g d'échine de porc","3 piments chili séchés","2 c. à c. d'achiote","Jus d'ananas","1 oignon","Ail","Cumin","Origan","Tortillas de maïs","Coriandre","Oignon blanc","Ananas frais","Citron vert"],steps:["Tremper les piments séchés dans l'eau chaude 20 minutes.","Mixer piments, achiote, jus d'ananas, ail et épices pour la marinade.","Mariner le porc au moins 2 heures, idéalement une nuit.","Faire griller ou saisir le porc en tranches fines à feu vif.","Réchauffer les tortillas.","Servir le porc avec ananas, oignon blanc, coriandre et citron vert."]},
{id:45,emoji:"🍱",name:"Sushi maki maison",tags:["Japonais","Asiatique"],time:"45 min",diff:"Difficile",srv:"4 pers",cal:"320 kcal",desc:"Des makis maison avec du riz vinaigré parfait, du saumon frais et du concombre.",ing:["300g de riz à sushi","4 feuilles de nori","200g de saumon frais","1 concombre","Avocat","4 c. à s. de vinaigre de riz","2 c. à s. de sucre","1 c. à c. de sel","Wasabi","Sauce soja","Gingembre mariné"],steps:["Rincer le riz jusqu'à l'eau claire. Cuire selon les instructions.","Mélanger vinaigre, sucre et sel. Incorporer au riz chaud en éventant.","Laisser refroidir à température ambiante.","Sur une natte en bambou, poser le nori. Étaler le riz sur 2/3 en laissant un bord.","Disposer le saumon et le concombre en bande. Rouler fermement.","Mouiller le bord de nori et sceller. Couper en 6-8 rondelles avec un couteau mouillé."]},
{id:46,emoji:"🥟",name:"Dim sum vapeur",tags:["Chinois","Asiatique"],time:"50 min",diff:"Difficile",srv:"4 pers",cal:"290 kcal",desc:"Des raviolis vapeur délicats farcis au porc et aux crevettes, avec une sauce soja au gingembre.",ing:["250g de pâte à dim sum (ou wonton)","200g de porc haché","150g de crevettes hachées","1 c. à s. de sauce soja","1 c. à c. d'huile de sésame","Gingembre râpé","Oignon vert","Sauce soja et gingembre pour tremper"],steps:["Mélanger porc haché, crevettes, sauce soja, sesame, gingembre et oignon vert.","Placer une cuillerée de farce au centre de chaque cercle de pâte.","Plisser les bords pour fermer hermétiquement.","Huiler légèrement le panier vapeur. Cuire 12 minutes à la vapeur.","Préparer la sauce : sauce soja, vinaigre de riz, gingembre râpé.","Servir immédiatement avec la sauce de trempage."]},
{id:47,emoji:"🫔",name:"Wrap poulet avocat",tags:["Rapide","Healthy"],time:"15 min",diff:"Facile",srv:"2 pers",cal:"490 kcal",desc:"Un wrap généreux et équilibré avec du poulet grillé, de l'avocat crémeux et des crudités croquantes.",ing:["2 blancs de poulet grillés","2 tortillas de blé","1 avocat","1 tomate","Laitue iceberg","1/2 oignon rouge","Sauce yaourt-ciboulette","Citron","Sel, poivre"],steps:["Couper le poulet grillé en lamelles.","Écraser l'avocat avec le citron, saler et poivrer.","Préparer la sauce : yaourt, ciboulette, sel, poivre.","Réchauffer légèrement les tortillas.","Étaler l'avocat sur chaque tortilla.","Disposer la laitue, la tomate, l'oignon, le poulet et la sauce. Rouler fermement."]},
{id:48,emoji:"🍲",name:"Moussaka grecque",tags:["Grec","Réconfortant"],time:"90 min",diff:"Difficile",srv:"6 pers",cal:"580 kcal",desc:"La moussaka traditionnelle grecque avec ses aubergines confites, sa viande d'agneau et sa béchamel.",ing:["3 aubergines","500g de viande d'agneau hachée","400g de tomates concassées","1 oignon","3 gousses d'ail","Cannelle","Muscade","500ml de lait","50g de beurre","50g de farine","2 œufs","200g de parmesan","Huile d'olive","Sel, poivre"],steps:["Couper les aubergines en tranches, saler et laisser dégorger 30 minutes.","Rincer, sécher et faire frire ou rôtir les aubergines à 200°C jusqu'à dorure.","Bolognaise : faire revenir l'oignon et l'ail. Ajouter l'agneau, les tomates, la cannelle.","Béchamel : beurre, farine, lait, assaisonner. Hors du feu, ajouter les œufs.","Monter : aubergines, viande, aubergines, béchamel généreuse.","Cuire au four à 180°C pendant 45 minutes."]},
{id:49,emoji:"🥘",name:"Cassoulet toulousain",tags:["Français","Réconfortant"],time:"180 min",diff:"Difficile",srv:"6 pers",cal:"780 kcal",desc:"Le monument de la cuisine du Sud-Ouest : haricots blancs, confit de canard, saucisses et couenne.",ing:["500g de haricots blancs secs","4 cuisses de confit de canard","4 saucisses de Toulouse","200g de poitrine fumée","1 jarret de porc","1 oignon","4 tomates","1 tête d'ail","Bouquet garni","Sel, poivre"],steps:["Tremper les haricots 12h. Les cuire 1h dans l'eau avec bouquet garni et poitrine.","Faire dorer les saucisses et le jarret.","Dans une grande cocotte, assembler haricots, viandes, tomates, oignon et ail.","Couvrir et cuire au four à 150°C pendant 2 heures.","Briser la croûte et remuer 3 fois pendant la cuisson.","Laisser reposer 15 minutes avant de servir."]},
{id:50,emoji:"🍜",name:"Soupe pho aux légumes",tags:["Asiatique","Vegan","Végétarien","Healthy","Sans gluten"],time:"50 min",diff:"Facile",srv:"4 pers",cal:"280 kcal",desc:"Une version végétarienne du pho vietnamien, avec un bouillon parfumé aux épices et des légumes croquants.",ing:["1.5L de bouillon de légumes","2 anis étoilés","1 bâton de cannelle","200g de nouilles de riz","1 carotte","100g de pak-choï","100g de champignons shiitake","Sauce soja","Pousses de soja","Basilic thaï","Oignon vert","Citron vert"],steps:["Faire infuser les épices dans le bouillon 20 minutes à frémissement.","Filtrer le bouillon et assaisonner avec la sauce soja.","Cuire les nouilles selon les instructions, rincer.","Préparer les légumes : carotte en julienne, pak-choï et champignons.","Blanchir rapidement les légumes dans le bouillon.","Servir dans les bols : nouilles, légumes, bouillon bouillant, herbes fraîches et citron."]},

{id:51,emoji:"🐓",name:"Coq au vin",tags:["Français","Réconfortant"],time:"120 min",diff:"Moyen",srv:"4 pers",cal:"540 kcal",desc:"L'authentique coq au vin bourguignon, mijoté longuement dans un vin rouge corsé avec des lardons.",ing:["1 poulet découpé","750ml de vin rouge (bourgogne)","200g de lardons","300g de champignons","2 oignons","3 carottes","4 gousses d'ail","Bouquet garni","Farine","Beurre","Cognac"],steps:["Mariner le poulet dans le vin avec les légumes 2h minimum.","Égoutter le poulet, fariner légèrement. Faire dorer dans le beurre.","Faire flamber au cognac.","Ajouter les légumes de la marinade et le vin filtré. Ajouter le bouquet garni.","Mijoter 1h à couvert.","Ajouter les lardons et champignons sautés. Cuire encore 20 minutes."]},
{id:52,emoji:"🥩",name:"Tartare de bœuf",tags:["Français","Rapide","Sans gluten"],time:"15 min",diff:"Facile",srv:"2 pers",cal:"380 kcal",desc:"Un tartare de bœuf classique, frais et bien assaisonné, servi avec des frites et une salade verte.",ing:["300g de filet de bœuf","2 jaunes d'œufs","1 c. à s. de câpres","1 c. à s. de cornichons hachés","1 c. à s. de moutarde","Tabasco","Worcestershire","Oignon rouge","Persil","Huile d'olive","Sel, poivre"],steps:["Hacher le bœuf très finement au couteau. Ne jamais utiliser de hachoir.","Mélanger jaunes, moutarde, Worcestershire, Tabasco.","Incorporer le bœuf haché, les câpres, cornichons, oignon et persil.","Assaisonner avec sel, poivre et huile.","Façonner en galette à l'aide d'un cercle.","Servir immédiatement avec des frites et une salade."]},
{id:53,emoji:"🫕",name:"Pot-au-feu",tags:["Français","Réconfortant","Hiver"],time:"180 min",diff:"Facile",srv:"6 pers",cal:"420 kcal",desc:"Le pot-au-feu bourgeois avec ses légumes fondants et sa viande tendre, un repas complet et généreux.",ing:["1kg de bœuf (plat de côtes, macreuse)","Os à moelle","3 carottes","3 navets","3 poireaux","3 branches de céleri","2 oignons","1 bouquet garni","Sel, poivre","Moutarde pour servir","Cornichons"],steps:["Plonger la viande dans l'eau froide salée. Porter à ébullition, écumer abondamment.","Ajouter les légumes entiers et le bouquet garni. Baisser le feu.","Mijoter 2h30 à tout petit frémissement.","Ajouter les os à moelle 30 minutes avant la fin.","Sortir la viande et les légumes délicatement.","Servir le bouillon en entrée, puis la viande avec les légumes, moutarde et cornichons."]},
{id:54,emoji:"🧇",name:"Gaufres de Liège",tags:["Belge","Dessert","Petit-déjeuner"],time:"40 min",diff:"Moyen",srv:"8 gaufres",cal:"380 kcal",desc:"Les vraies gaufres de Liège avec leur sucre perlé caramélisé et leur pâte levée briochée.",ing:["300g de farine","150g de beurre mou","2 œufs","100ml de lait tiède","10g de levure","50g de sucre","100g de sucre perlé","1 pincée de sel","Vanille"],steps:["Dissoudre la levure dans le lait tiède.","Mélanger farine, sel, sucre et vanille. Ajouter les œufs et le lait.","Incorporer le beurre mou en morceaux. Pétrir jusqu'à pâte lisse.","Laisser lever 1 heure.","Incorporer le sucre perlé délicatement.","Former des boulettes et cuire au gaufrier chaud 4 à 5 minutes."]},
{id:55,emoji:"🥘",name:"Blanquette de veau",tags:["Français","Réconfortant"],time:"90 min",diff:"Moyen",srv:"4 pers",cal:"520 kcal",desc:"La blanquette de veau à l'ancienne, une sauce blanche crémeuse et veloutée avec des légumes fondants.",ing:["1kg de veau (épaule ou flanchet)","300g de champignons","2 carottes","2 poireaux","1 oignon","50g de beurre","50g de farine","200ml de crème fraîche","2 jaunes d'œufs","Citron","Bouquet garni"],steps:["Couvrir le veau d'eau froide, porter à ébullition, écumer. Ajouter les légumes et le bouquet garni.","Mijoter 1h à feu doux.","Retirer viande et légumes. Filtrer et mesurer le bouillon.","Faire un roux avec beurre et farine. Incorporer 700ml de bouillon.","Lier avec les jaunes et la crème. Ajouter le jus de citron.","Remettre viande et légumes dans la sauce. Chauffer doucement."]},
{id:56,emoji:"🍣",name:"Poké bowl au saumon",tags:["Hawaien","Healthy","Rapide","Sans gluten"],time:"20 min",diff:"Facile",srv:"2 pers",cal:"520 kcal",desc:"Le poké hawaïen avec du saumon mariné au soja et à l'huile de sésame, sur un riz aux algues.",ing:["200g de saumon frais","200g de riz à sushi cuit","1 avocat","1 carotte","1 concombre","Edamame","Algues wakame","3 c. à s. de sauce soja","1 c. à c. de sésame","Gingembre mariné","Graines de sésame"],steps:["Couper le saumon en cubes. Mariner 15 minutes avec soja, sésame et gingembre.","Préparer le riz avec du vinaigre de riz.","Couper l'avocat, la carotte et le concombre.","Hydrater les algues wakame selon les instructions.","Assembler les bols : riz, algues, saumon marin, légumes.","Saupoudrer de graines de sésame et napper du reste de marinade."]},
{id:57,emoji:"🥧",name:"Quiche lorraine",tags:["Français","Rapide"],time:"50 min",diff:"Facile",srv:"6 pers",cal:"490 kcal",desc:"La quiche lorraine classique avec ses lardons et son appareil à l'œuf et à la crème, sur une pâte brisée.",ing:["1 pâte brisée","200g de lardons","4 œufs","300ml de crème fraîche","100ml de lait","100g de gruyère râpé","Noix de muscade","Sel, poivre"],steps:["Préchauffer le four à 200°C.","Foncer le moule avec la pâte brisée. Piquer le fond.","Faire revenir les lardons sans matière grasse.","Battre les œufs avec la crème, le lait, la muscade, sel et poivre.","Répartir les lardons et le gruyère sur la pâte. Verser l'appareil.","Cuire 30 à 35 minutes jusqu'à ce que la quiche soit dorée et gonflée."]},
{id:58,emoji:"🫙",name:"Houmous betterave",tags:["Healthy","Vegan","Végétarien","Coloré"],time:"15 min",diff:"Facile",srv:"6 pers",cal:"130 kcal",desc:"Un houmous rose vif à la betterave, crémeux et légèrement sucré, qui éblouit autant qu'il régale.",ing:["400g de pois chiches","200g de betteraves cuites","3 c. à s. de tahini","1 citron","1 gousse d'ail","3 c. à s. d'huile d'olive","Cumin","Sel","Graines de sésame noir pour garnir"],steps:["Mixer tous les ingrédients ensemble.","Ajuster la consistance avec un peu d'eau glacée.","Goûter et rectifier le sel, le citron ou le cumin.","La texture doit être très lisse — mixer au moins 3 minutes.","Verser dans un plat, faire des tourbillons avec le dos d'une cuillère.","Garnir d'huile d'olive, de graines de sésame noir et d'une pincée de cumin."]},
{id:59,emoji:"🍋",name:"Tarte au citron meringuée",tags:["Français","Dessert"],time:"60 min",diff:"Difficile",srv:"8 pers",cal:"420 kcal",desc:"La tarte au citron avec sa crème acidulée et sa meringue italienne nacrée. L'équilibre parfait du sucré-acidulé.",ing:["1 pâte sablée","4 citrons","4 œufs","180g de sucre","100g de beurre","3 blancs d'œufs","150g de sucre pour meringue","50ml d'eau"],steps:["Cuire la pâte à blanc à 180°C pendant 15 minutes.","Crème citron : faire chauffer jus et zestes, mélanger avec les œufs et le sucre, épaissir à feu doux.","Incorporer le beurre froid en dés. Verser sur la pâte. Réfrigérer 1h.","Meringue italienne : porter sucre et eau à 121°C. Verser en filet sur les blancs montés.","Etaler ou dresser la meringue sur la crème.","Colorer au chalumeau."]},
{id:60,emoji:"🥐",name:"Croissants au beurre",tags:["Français","Petit-déjeuner"],time:"240 min",diff:"Difficile",srv:"12 croissants",cal:"290 kcal",desc:"Les croissants feuilletés et dorés à la française, une réussite artisanale à réaliser le week-end.",ing:["500g de farine","280ml de lait tiède","10g de levure","10g de sel","60g de sucre","280g de beurre froid pour le tourage","1 œuf pour la dorure"],steps:["Faire la détrempe : mélanger farine, levure, sel, sucre et lait. Pétrir 5 minutes. Réfrigérer 1h.","Faire un carré avec le beurre froid entre deux feuilles de papier cuisson.","Étaler la pâte, envelopper le beurre. Donner 2 tours simples, réfrigérer 30 minutes. Répéter 3 fois.","Étaler finement et découper des triangles. Rouler de la base vers la pointe.","Laisser pousser 2 heures à température ambiante.","Dorer et cuire à 190°C pendant 15 minutes."]},

{id:61,emoji:"🍝",name:"Pesto genovese",tags:["Italien","Végétarien","Rapide","Sans gluten"],time:"10 min",diff:"Facile",srv:"4 pers",cal:"390 kcal",desc:"Le vrai pesto génois au mortier : basilic frais, pignons, parmesan et ail.",ing:["50g de basilic frais","30g de pignons de pin","50g de parmesan","1 gousse d'ail","150ml d'huile d'olive","Sel"],steps:["Torréfier légèrement les pignons à sec.","Mixer basilic, pignons, ail et sel.","Ajouter le parmesan et mixer.","Incorporer l'huile en filet.","Mélanger avec les pâtes chaudes en ajoutant un peu d'eau de cuisson.","Servir immédiatement."]},
{id:62,emoji:"🍜",name:"Ramen shoyu",tags:["Japonais","Asiatique"],time:"30 min",diff:"Facile",srv:"2 pers",cal:"480 kcal",desc:"Un ramen au bouillon de soja clair et savoureux, garni d'un œuf mollet et de nori.",ing:["200g de ramen","1L de bouillon de poulet","4 c. à s. de sauce soja","2 c. à s. de mirin","1 c. à s. de saké","2 œufs","Nori","Oignon vert","Huile de sésame"],steps:["Porter le bouillon à frémissement avec soja, mirin et saké.","Cuire les œufs 7 minutes, refroidir et écaler.","Cuire les ramen.","Assaisonner le bouillon avec l'huile de sésame.","Répartir les ramen dans les bols, verser le bouillon.","Garnir avec l'œuf coupé, le nori et l'oignon vert."]},
{id:63,emoji:"🥗",name:"Taboulé libanais",tags:["Libanais","Vegan","Végétarien","Healthy","Été"],time:"20 min",diff:"Facile",srv:"4 pers",cal:"190 kcal",desc:"Le vrai taboulé libanais, très en herbes et peu en boulgour, frais et citronné.",ing:["1 bouquet de persil plat","1/2 bouquet de menthe","3 tomates","1 oignon vert","50g de boulgour fin","3 citrons","5 c. à s. d'huile d'olive","Sel, poivre"],steps:["Hydrater le boulgour avec le jus d'un citron pendant 15 minutes.","Hacher finement le persil et la menthe.","Couper les tomates en très petits dés.","Mélanger tous les ingrédients.","Assaisonner généreusement avec citron, huile, sel et poivre.","Réfrigérer 30 minutes avant de servir."]},
{id:64,emoji:"🍛",name:"Palak paneer",tags:["Indien","Végétarien","Sans gluten"],time:"35 min",diff:"Moyen",srv:"4 pers",cal:"360 kcal",desc:"Le curry d'épinards et de fromage indien, d'une belle couleur verte et d'une onctuosité remarquable.",ing:["500g d'épinards","250g de paneer","1 oignon","3 gousses d'ail","1 c. à c. de gingembre","Cumin","Coriandre","Garam masala","Crème fraîche","Huile","Sel"],steps:["Blanchir les épinards 2 minutes. Mixer en purée.","Faire dorer le paneer en cubes dans l'huile. Réserver.","Faire revenir oignon, ail et gingembre avec les épices.","Ajouter la purée d'épinards. Cuire 10 minutes.","Incorporer le paneer et la crème.","Servir avec du naan ou du riz basmati."]},
{id:65,emoji:"🥘",name:"Bouillabaisse marseillaise",tags:["Français","Fruits de mer"],time:"90 min",diff:"Difficile",srv:"6 pers",cal:"480 kcal",desc:"La soupe de poissons marseillaise avec sa rouille au safran et ses croûtons grillés.",ing:["2kg de poissons variés (rascasse, grondin, vive)","500g de moules","500g de crevettes","2 oignons","4 tomates","1 bulbe de fenouil","Safran","Bouquet garni","Pastis","Rouille","Baguette"],steps:["Faire revenir oignons, tomates, fenouil dans l'huile.","Ajouter le bouquet garni, le safran et un verre de pastis.","Couvrir d'eau. Porter à ébullition 20 minutes.","Ajouter les poissons par ordre de cuisson (les plus fermes en premier).","Ajouter les fruits de mer en dernier. Cuire 10 minutes.","Servir avec des croûtons frottés à l'ail et nappés de rouille."]},
{id:66,emoji:"🍕",name:"Pizza quattro formaggi",tags:["Italien","Végétarien"],time:"35 min",diff:"Facile",srv:"2 pers",cal:"620 kcal",desc:"La pizza aux quatre fromages : mozzarella, gorgonzola, parmesan et fontine fondus ensemble.",ing:["1 pâte à pizza","100g de mozzarella","80g de gorgonzola","60g de parmesan","80g de fontine","Huile d'olive","Poivre","Feuilles de roquette pour finir"],steps:["Préchauffer le four au maximum (250°C).","Étaler la pâte finement.","Émietter et répartir les fromages.","Poivrer généreusement. Arroser d'huile d'olive.","Cuire 10 à 12 minutes jusqu'à brunissement du fromage.","Garnir de roquette fraîche à la sortie du four."]},
{id:67,emoji:"🫕",name:"Bœuf au gingembre sauté",tags:["Asiatique","Rapide","Sans gluten"],time:"20 min",diff:"Facile",srv:"2 pers",cal:"420 kcal",desc:"Un sauté de bœuf au gingembre et à la citronnelle façon thaïlandaise, rapide et parfumé.",ing:["300g de filet de bœuf","3cm de gingembre frais","2 bâtons de citronnelle","3 gousses d'ail","2 c. à s. de sauce huître","1 c. à s. de sauce soja","Basilic thaï","Piment","Huile","Riz"],steps:["Couper le bœuf en tranches fines.","Émincer gingembre, citronnelle et ail.","Chauffer un wok à feu vif. Faire sauter le bœuf 2 minutes.","Ajouter gingembre, ail, citronnelle et piment. Sauter 1 minute.","Assaisonner avec les sauces.","Terminer avec le basilic thaï. Servir sur du riz."]},
{id:68,emoji:"🥞",name:"Crêpes bretonnes",tags:["Français","Petit-déjeuner","Dessert"],time:"30 min",diff:"Facile",srv:"8 crêpes",cal:"180 kcal",desc:"La vraie pâte à crêpes bretonne, fine et dorée, à garnir selon les envies.",ing:["250g de farine","3 œufs","500ml de lait","30g de beurre fondu","1 pincée de sel","1 c. à s. de sucre","Beurre de cuisson"],steps:["Mélanger farine, sel et sucre. Former un puits.","Incorporer les œufs, puis le lait progressivement pour éviter les grumeaux.","Ajouter le beurre fondu. Laisser reposer 1 heure.","Faire fondre un peu de beurre dans une crêpière bien chaude.","Verser une louche de pâte en inclinant la poêle rapidement.","Cuire 1 minute par face. Servir avec beurre-sucre, citron ou confiture."]},
{id:69,emoji:"🌯",name:"Burrito au poulet",tags:["Mexicain","Rapide"],time:"25 min",diff:"Facile",srv:"2 pers",cal:"620 kcal",desc:"Un burrito généreux avec du poulet épicé, du riz, des haricots noirs, du guacamole et de la crème.",ing:["2 grandes tortillas de blé","2 blancs de poulet","1 boîte de haricots noirs","150g de riz cuit","Guacamole","Crème fraîche","Cheddar râpé","Cumin","Paprika","Piment","Sauce salsa"],steps:["Cuire le poulet avec cumin, paprika et piment. Couper en lamelles.","Réchauffer les haricots noirs avec un peu de cumin.","Réchauffer les tortillas au micro-ondes 20 secondes.","Disposer riz, haricots, poulet, guacamole, crème et cheddar au centre.","Replier les côtés et rouler fermement.","Faire griller 2 minutes dans une poêle chaude pour sceller."]},
{id:70,emoji:"🍱",name:"Onigiri au saumon",tags:["Japonais","Rapide","Healthy"],time:"20 min",diff:"Facile",srv:"4 onigiri",cal:"220 kcal",desc:"Les boulettes de riz japonaises garnies de saumon et enveloppées de nori croquant.",ing:["300g de riz à sushi cuit","150g de saumon fumé","2 feuilles de nori","3 c. à s. de vinaigre de riz","Sel","Graines de sésame"],steps:["Assaisonner le riz chaud avec vinaigre de riz et sel.","Laisser tiédir.","Humidifier les mains avec de l'eau salée.","Prendre une poignée de riz, creuser un puits, y mettre un morceau de saumon.","Former un triangle compact en appuyant fermement.","Entourer de bandes de nori. Parsemer de graines de sésame."]},
