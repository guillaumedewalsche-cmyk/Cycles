{id:71,emoji:"🍲",name:"Lentilles mijotées au cumin",tags:["Vegan","Végétarien","Healthy","Rapide","Sans gluten"],time:"30 min",diff:"Facile",srv:"4 pers",cal:"290 kcal",desc:"Des lentilles vertes du Puy mijotées aux épices et aux herbes, simples et nourrissantes.",ing:["300g de lentilles vertes","1 oignon","2 carottes","3 gousses d'ail","Cumin","Thym","Laurier","Huile d'olive","Sel, poivre"],steps:["Rincer les lentilles. Faire revenir oignon et carottes dans l'huile.","Ajouter l'ail et le cumin. Cuire 1 minute.","Verser les lentilles et couvrir d'eau. Porter à ébullition.","Ajouter thym et laurier. Mijoter 25 minutes.","Les lentilles doivent être fondantes mais entières.","Assaisonner généreusement. Servir avec du pain de campagne."]},
{id:72,emoji:"🥩",name:"Magret de canard aux cerises",tags:["Français","Élégant"],time:"25 min",diff:"Moyen",srv:"2 pers",cal:"580 kcal",desc:"Un magret de canard rosé avec une sauce aux cerises acidulées, pour un repas raffiné.",ing:["2 magrets de canard","300g de cerises","2 c. à s. de sucre","100ml de vin rouge","1 c. à s. de vinaigre balsamique","Sel, poivre"],steps:["Quadriller le gras du magret en croisillons sans toucher la chair.","Saisir côté gras à froid dans une poêle. Cuire 8 minutes pour faire fondre le gras.","Retourner et cuire 5 minutes pour la cuisson rosée. Saler, poivrer.","Laisser reposer sous alu.","Dans les sucs de cuisson, caraméliser les cerises avec le sucre. Déglacer au vin et vinaigre.","Trancher le magret en biais. Napper de sauce aux cerises."]},
{id:73,emoji:"🫔",name:"Nems croustillants",tags:["Asiatique","Apéro"],time:"45 min",diff:"Moyen",srv:"4 pers",cal:"320 kcal",desc:"Des nems croustillants farcis au porc et aux crevettes, avec une sauce nuoc-chấm citronnée.",ing:["12 galettes de riz","200g de porc haché","100g de crevettes","100g de vermicelles de riz","Carottes râpées","Champignons noirs","Sauce nuoc-mâm","Sucre","Citron vert","Salade","Herbes fraîches"],steps:["Hydrater les vermicelles et champignons noirs. Hacher grossièrement.","Mélanger porc, crevettes, vermicelles, champignons, carottes. Assaisonner.","Ramollir les galettes une par une dans l'eau tiède.","Poser la farce en bas de la galette. Plier les côtés et rouler.","Frire à 170°C pendant 6 à 8 minutes jusqu'à dorure croustillante.","Sauce : nuoc-mâm dilué, sucre, citron vert, ail, piment."]},
{id:74,emoji:"🥗",name:"Salade grecque",tags:["Grec","Vegan","Végétarien","Healthy","Rapide","Sans gluten"],time:"10 min",diff:"Facile",srv:"2 pers",cal:"280 kcal",desc:"La salade grecque colorée avec tomates, concombre, olives kalamata et feta, à l'huile d'olive.",ing:["2 tomates","1 concombre","100g de feta","50g d'olives kalamata","1 oignon rouge","Origan séché","Huile d'olive","Sel, poivre"],steps:["Couper les tomates en quartiers et le concombre en rondelles.","Émincer finement l'oignon rouge.","Disposer dans un plat.","Ajouter la feta en gros morceaux et les olives.","Saupoudrer d'origan généreusement.","Arroser d'huile d'olive. Saler et poivrer."]},
{id:75,emoji:"🍩",name:"Beignets de pommes",tags:["Français","Dessert","Rapide"],time:"20 min",diff:"Facile",srv:"4 pers",cal:"320 kcal",desc:"Des rondelles de pommes enrobées d'une pâte légère à la bière, frites et saupoudrées de sucre.",ing:["3 pommes Golden","200g de farine","250ml de bière blonde","1 œuf","1 pincée de sel","Sucre","Cannelle","Huile de friture"],steps:["Mélanger farine, sel, œuf et bière pour obtenir une pâte lisse.","Éplucher les pommes et les couper en rondelles de 1cm. Épépiner.","Faire chauffer l'huile à 180°C.","Tremper les rondelles dans la pâte.","Frire 3 minutes jusqu'à dorure. Égoutter.","Saupoudrer de sucre et cannelle. Servir chaud."]},
{id:76,emoji:"🍲",name:"Soupe de potiron au lait de coco",tags:["Vegan","Végétarien","Healthy","Automne"],time:"35 min",diff:"Facile",srv:"4 pers",cal:"230 kcal",desc:"Une soupe veloutée et exotique au potiron et lait de coco, parfumée au curry.",ing:["800g de potiron","400ml de lait de coco","1 oignon","2 gousses d'ail","1 c. à c. de curry","1 cm de gingembre","Bouillon de légumes","Coriandre","Huile"],steps:["Éplucher et couper le potiron. Faire revenir oignon et ail.","Ajouter gingembre et curry.","Incorporer le potiron et le bouillon. Cuire 20 minutes.","Mixer finement. Ajouter le lait de coco.","Réchauffer doucement. Assaisonner.","Servir avec de la coriandre et des graines grillées."]},
{id:77,emoji:"🥘",name:"Poulet mafé",tags:["Africain","Réconfortant"],time:"60 min",diff:"Moyen",srv:"4 pers",cal:"560 kcal",desc:"Le plat emblématique d'Afrique de l'Ouest : un ragoût de poulet à la sauce arachide, riche et parfumé.",ing:["1 poulet découpé","200g de pâte d'arachide","400g de tomates concassées","1 oignon","3 gousses d'ail","1 piment","Laurier","Cube de bouillon","Sel, poivre","Riz pour servir"],steps:["Faire dorer les morceaux de poulet dans l'huile. Réserver.","Faire revenir l'oignon et l'ail. Ajouter les tomates.","Diluer la pâte d'arachide avec un peu d'eau chaude. Ajouter à la sauce.","Remettre le poulet. Ajouter le bouillon, le piment et le laurier.","Mijoter 40 minutes. La sauce doit être épaisse et brillante.","Servir sur du riz blanc."]},
{id:78,emoji:"🧀",name:"Fondue savoyarde",tags:["Français","Réconfortant","Hiver"],time:"20 min",diff:"Facile",srv:"4 pers",cal:"680 kcal",desc:"La fondue au fromage savoyarde avec sa triade Comté, Beaufort et Emmental, au vin blanc.",ing:["400g d'Emmental","200g de Comté","200g de Beaufort","300ml de vin blanc de Savoie","1 gousse d'ail","1 c. à s. de Maïzena","Poivre","Noix de muscade","Pain de campagne"],steps:["Frotter le caquelon à fondue avec l'ail coupé.","Verser le vin et chauffer à feu moyen.","Ajouter les fromages râpés progressivement en remuant en huit.","Délayer la Maïzena dans un peu de vin froid. Incorporer pour lier.","Assaisonner avec muscade et poivre.","Maintenir à feu doux et tremper les morceaux de pain."]},
{id:79,emoji:"🍋",name:"Sorbet citron maison",tags:["Vegan","Végétarien","Dessert","Healthy","Sans gluten","Été"],time:"20 min",diff:"Facile",srv:"4 pers",cal:"150 kcal",desc:"Un sorbet au citron vif et rafraîchissant, sans sorbetière, à base de citrons givrés.",ing:["6 gros citrons","200g de sucre","200ml d'eau","2 blancs d'œufs"],steps:["Couper le chapeau des citrons, évider la chair en gardant les coques.","Passer la chair au tamis pour obtenir du jus.","Faire un sirop avec sucre et eau. Refroidir.","Mélanger jus de citron et sirop. Congeler 2 heures.","Battre les blancs en neige. Incorporer à la préparation à moitié congelée.","Replacer dans les coques de citron. Congeler encore 2 heures."]},
{id:80,emoji:"🫓",name:"Pain de mie brioché",tags:["Français","Petit-déjeuner"],time:"180 min",diff:"Moyen",srv:"1 pain",cal:"220 kcal",desc:"Un pain de mie moelleux et légèrement brioché, parfait pour les toasts et les sandwichs.",ing:["500g de farine","280ml de lait","10g de levure","60g de beurre mou","2 c. à s. de sucre","10g de sel","1 œuf"],steps:["Diluer la levure dans le lait tiède. Mélanger avec la farine, sucre et sel.","Pétrir 8 minutes. Incorporer le beurre mou. Pétrir encore 5 minutes.","Laisser lever 1h30 à couvert.","Dégazer. Façonner en pain et placer dans un moule beurré.","Laisser lever encore 45 minutes.","Dorer à l'œuf. Cuire à 180°C pendant 30 minutes."]},
{id:81,emoji:"🥩",name:"Merguez maison grillées",tags:["Maghrébin","Épicé","Barbecue"],time:"30 min",diff:"Moyen",srv:"4 pers",cal:"380 kcal",desc:"Des merguez maison épicées à l'harissa et au cumin, juteuses et parfumées à griller.",ing:["500g d'agneau haché","100g de bœuf haché","2 c. à s. d'harissa","1 c. à c. de cumin","1 c. à c. de coriandre","1 c. à c. de paprika fumé","2 gousses d'ail","Boyaux naturels","Sel"],steps:["Mélanger les viandes avec toutes les épices et l'ail. Réserver 1h au frais.","Rincer les boyaux à l'eau froide.","Farcir les boyaux sans trop tasser. Tordre tous les 15cm.","Piquer légèrement avec une aiguille.","Griller sur braise ou poêle-gril 12 minutes en retournant.","Servir avec du pain et de la harissa."]},
{id:82,emoji:"🍛",name:"Aloo gobi",tags:["Indien","Vegan","Végétarien","Sans gluten","Healthy"],time:"35 min",diff:"Facile",srv:"4 pers",cal:"260 kcal",desc:"Le curry indien de pommes de terre et de chou-fleur, sec et parfumé au curcuma.",ing:["500g de pommes de terre","1 chou-fleur","1 oignon","3 gousses d'ail","Gingembre","1 c. à c. de curcuma","Cumin","Coriandre","Garam masala","Piment","Coriandre fraîche","Huile"],steps:["Couper pommes de terre et chou-fleur en morceaux.","Faire revenir oignon, ail et gingembre dans l'huile.","Ajouter les épices et faire revenir 1 minute.","Ajouter les légumes. Mélanger pour enrober d'épices.","Couvrir et cuire 20 minutes en remuant de temps en temps.","Garnir de coriandre fraîche. Servir avec du chapati."]},
{id:83,emoji:"🍮",name:"Panna cotta vanille coulis framboise",tags:["Italien","Dessert","Rapide"],time:"15 min",diff:"Facile",srv:"4 pers",cal:"350 kcal",desc:"Une panna cotta soyeuse à la vanille avec un coulis de framboises acidulées.",ing:["500ml de crème liquide","3 feuilles de gélatine","70g de sucre","1 gousse de vanille","200g de framboises","2 c. à s. de sucre glace","Jus de citron"],steps:["Ramollir la gélatine dans l'eau froide.","Chauffer la crème avec le sucre et la vanille sans bouillir.","Essorer la gélatine. Incorporer hors du feu en remuant.","Verser dans des verrines. Réfrigérer 4 heures minimum.","Mixer les framboises avec le sucre glace et le citron. Passer au tamis.","Verser le coulis sur les panna cotta au moment de servir."]},
{id:84,emoji:"🥗",name:"Poke bowl végétarien",tags:["Hawaien","Végétarien","Vegan","Healthy","Sans gluten"],time:"20 min",diff:"Facile",srv:"2 pers",cal:"430 kcal",desc:"Un poke bowl végétalien et coloré avec du tofu mariné, des légumes croquants et une sauce miso.",ing:["200g de riz à sushi","200g de tofu ferme","1 avocat","Edamame","Carottes","Radis","Concombre","2 c. à s. de miso blanc","1 c. à s. de soja","Sésame","Gingembre"],steps:["Couper le tofu en cubes. Mariner avec soja et gingembre 20 min.","Faire sauter le tofu jusqu'à dorure.","Cuire le riz. Assaisonner avec vinaigre de riz.","Mélanger miso, soja et une cuillère d'eau pour la sauce.","Assembler : riz, tofu, légumes colorés.","Napper de sauce miso et garnir de sésame."]},
{id:85,emoji:"🍝",name:"Cacio e pepe",tags:["Italien","Végétarien","Rapide"],time:"15 min",diff:"Moyen",srv:"2 pers",cal:"540 kcal",desc:"Le plat romain le plus simple et le plus technique : pâtes, pecorino et poivre, c'est tout.",ing:["200g de tonnarelli ou spaghetti","100g de pecorino romano râpé","2 c. à c. de poivre noir concassé","Sel"],steps:["Cuire les pâtes dans très peu d'eau (la rendre amidonnée).","Toaster le poivre à sec dans une grande poêle.","Ajouter une louche d'eau de cuisson sur le poivre.","Égoutter les pâtes al dente dans la poêle. Mélanger.","Hors du feu, incorporer le pecorino en remuant vivement avec de l'eau de cuisson.","La sauce doit être crémeuse et brillante. Servir immédiatement."]},
{id:86,emoji:"🫕",name:"Osso buco à la milanaise",tags:["Italien","Réconfortant"],time:"90 min",diff:"Moyen",srv:"4 pers",cal:"540 kcal",desc:"Le jarret de veau braisé à la milanaise avec sa gremolata citronnée et son risotto safran.",ing:["4 tranches de jarret de veau","1 oignon","2 carottes","2 branches de céleri","200ml de vin blanc","400g de tomates concassées","Bouillon","Farine","Beurre","Zeste de citron","Ail","Persil"],steps:["Fariner les jarrets. Les faire dorer dans le beurre.","Faire revenir les légumes. Déglacer au vin blanc.","Ajouter les tomates et le bouillon. Couvrir les jarrets à mi-hauteur.","Couvrir et cuire au four à 160°C pendant 1h30.","Préparer la gremolata : mélanger zeste de citron, ail et persil hachés.","Servir les jarrets avec le jus de cuisson et la gremolata."]},
{id:87,emoji:"🍜",name:"Laksa malaisien",tags:["Asiatique","Épicé","Réconfortant"],time:"40 min",diff:"Moyen",srv:"4 pers",cal:"520 kcal",desc:"Le laksa crémeux et épicé de Malaisie, un bouillon de coco au curry avec des nouilles et des crevettes.",ing:["400ml de lait de coco","500ml de bouillon","200g de nouilles de riz","300g de crevettes","100g de pousses de soja","2 c. à s. de pâte de curry","Citronnelle","Galanga","Sauce poisson","Citron vert","Herbes"],steps:["Faire revenir la pâte de curry avec la citronnelle et le galanga.","Ajouter le lait de coco et le bouillon. Porter à frémissement.","Assaisonner avec la sauce de poisson.","Cuire les crevettes dans le bouillon 3 minutes.","Cuire les nouilles séparément.","Assembler : nouilles, crevettes, pousses de soja, bouillon, herbes fraîches."]},
{id:88,emoji:"🥐",name:"Kouign-amann",tags:["Français","Dessert","Breton"],time:"120 min",diff:"Difficile",srv:"8 pers",cal:"480 kcal",desc:"Le gâteau breton caramélisé, croustillant et feuilleté, avec son beurre et son sucre caramélisés.",ing:["300g de farine","10g de levure","180ml d'eau tiède","150g de beurre demi-sel","150g de sucre","1 pincée de sel"],steps:["Faire une pâte à pain simple. Laisser lever 1h.","Étaler la pâte en rectangle. Parsemer de beurre en morceaux et de sucre.","Plier en trois comme un feuilletage. Répéter 2 fois.","Placer dans un moule beurré sucré.","Laisser lever 30 minutes.","Cuire à 200°C pendant 30 minutes jusqu'à caramélisation."]},
{id:89,emoji:"🍋",name:"Limonade maison au basilic",tags:["Vegan","Rapide","Boisson","Été"],time:"15 min",diff:"Facile",srv:"6 pers",cal:"90 kcal",desc:"Une limonade fraîche et parfumée au basilic frais, légèrement pétillante et pleine de saveurs.",ing:["6 citrons","150g de sucre","1L d'eau","1 bouquet de basilic frais","Eau pétillante","Glaçons"],steps:["Presser les citrons.","Faire un sirop : chauffer l'eau avec le sucre et quelques feuilles de basilic. Refroidir.","Filtrer le sirop.","Mélanger jus de citron et sirop dans un pichet.","Ajouter des feuilles de basilic fraîches et des glaçons.","Compléter avec l'eau pétillante au moment de servir."]},
{id:90,emoji:"🥧",name:"Clafoutis aux cerises",tags:["Français","Dessert"],time:"40 min",diff:"Facile",srv:"6 pers",cal:"280 kcal",desc:"Le clafoutis limousin traditionnel avec des cerises noires entières dans un appareil moelleux à la vanille.",ing:["500g de cerises","3 œufs","100g de sucre","100g de farine","300ml de lait","30g de beurre fondu","1 c. à c. de vanille","Sucre glace","Sel"],steps:["Préchauffer le four à 180°C. Beurrer un plat.","Ne pas dénoyauter les cerises (tradition).","Fouetter œufs, sucre et sel jusqu'à blanchissement.","Incorporer farine, lait, beurre et vanille.","Répartir les cerises dans le plat. Verser l'appareil.","Cuire 35 minutes. Saupoudrer de sucre glace. Servir tiède."]},
/* 90 recettes — séries finales pour atteindre 100 */
{id:91,emoji:"🫕",name:"Goulash hongrois",tags:["Hongrois","Réconfortant","Épicé"],time:"120 min",diff:"Facile",srv:"6 pers",cal:"480 kcal",desc:"Le ragoût hongrois au paprika, un plat rustique et réconfortant avec un bouillon parfumé.",ing:["1kg de bœuf à braiser","3 oignons","3 c. à s. de paprika doux","1 c. à s. de paprika fort","3 poivrons","400g de tomates","Bouillon","Caraway (cumin des prés)","Crème fraîche","Sel, poivre"],steps:["Couper le bœuf en gros cubes. Faire revenir les oignons dans l'huile.","Ajouter la viande et faire dorer.","Incorporer le paprika hors du feu (pour ne pas le brûler).","Ajouter poivrons, tomates et bouillon. Saler, poivrer.","Mijoter 1h30 à couvert.","Servir avec des nouilles hongroises et une cuillerée de crème."]},
{id:92,emoji:"🍛",name:"Biryani agneau",tags:["Indien","Réconfortant"],time:"90 min",diff:"Difficile",srv:"6 pers",cal:"620 kcal",desc:"Le biryani royal avec de l'agneau mariné aux épices et du riz parfumé au safran.",ing:["800g d'épaule d'agneau","400g de riz basmati","Safran","Garam masala","Yogourt","Oignons frits","Amandes","Raisins secs","Ghee","Menthe"],steps:["Mariner l'agneau dans le yogourt et les épices 2h.","Cuire l'agneau mijoté 45 minutes.","Précuire le riz à mi-cuisson.","Dans une grande casserole : couche de riz, couche d'agneau, couche de riz.","Arroser de safran dilué et de ghee. Fermer hermétiquement.","Cuire à feu doux 25 minutes (dum). Garnir d'oignons frits et d'amandes."]},
{id:93,emoji:"🍦",name:"Glace vanille maison",tags:["Dessert","Végétarien"],time:"30 min",diff:"Moyen",srv:"6 pers",cal:"290 kcal",desc:"Une glace à la vanille onctueuse et crémeuse, sans sorbetière, avec des jaunes d'œufs.",ing:["500ml de crème liquide entière","250ml de lait entier","5 jaunes d'œufs","150g de sucre","2 gousses de vanille"],steps:["Chauffer lait et crème avec la vanille fendue.","Fouetter jaunes et sucre jusqu'à blanchissement.","Incorporer le lait chaud en fouettant. Remettre sur feu doux.","Cuire à 82°C en remuant (nappe la cuillère). Refroidir rapidement.","Turbiner en sorbetière ou congeler en fouettant toutes les 30 min pendant 3h.","Sortir 10 minutes avant de servir."]},
{id:94,emoji:"🥘",name:"Poulet basquaise",tags:["Français","Basque","Réconfortant"],time:"60 min",diff:"Facile",srv:"4 pers",cal:"420 kcal",desc:"Le poulet basquaise avec sa sauce aux poivrons et tomates parfumée au piment d'Espelette.",ing:["1 poulet découpé","3 poivrons (rouge et vert)","4 tomates","1 oignon","3 gousses d'ail","Piment d'Espelette","Jambon de Bayonne","Vin blanc","Huile d'olive","Herbes"],steps:["Faire dorer le poulet dans l'huile. Réserver.","Faire revenir l'oignon, l'ail et le jambon.","Ajouter les poivrons émincés. Cuire 10 minutes.","Incorporer les tomates concassées et le vin blanc.","Remettre le poulet. Assaisonner au piment d'Espelette.","Mijoter 35 minutes à couvert."]},
{id:95,emoji:"🍰",name:"Mille-feuille crème pâtissière",tags:["Français","Dessert"],time:"60 min",diff:"Difficile",srv:"6 pers",cal:"490 kcal",desc:"Le mille-feuille classique de la pâtisserie française, crème pâtissière vanillée entre trois feuilletages.",ing:["1 pâte feuilletée","500ml de lait","4 jaunes d'œufs","100g de sucre","40g de Maïzena","1 gousse de vanille","200g de sucre glace","Chocolat"],steps:["Cuire la pâte feuilletée à 200°C entre deux plaques (30 min). Couper en 3 rectangles.","Crème pâtissière : chauffer lait et vanille, fouetter jaunes-sucre-maïzena, verser le lait chaud, cuire jusqu'à épaississement.","Laisser refroidir la crème en filmant au contact.","Monter : feuilletage, crème, feuilletage, crème, feuilletage.","Glacer avec le fondant blanc. Décorer avec le chocolat fondu.","Réfrigérer 1h. Couper à la scie pour ne pas écraser."]},
{id:96,emoji:"🌿",name:"Curry vert thaï au poulet",tags:["Asiatique","Épicé","Rapide"],time:"25 min",diff:"Facile",srv:"4 pers",cal:"460 kcal",desc:"Le curry vert thaïlandais au lait de coco, parfumé à la citronnelle et au galanga.",ing:["600g de blanc de poulet","400ml de lait de coco","2 c. à s. de pâte curry vert","1 tige de citronnelle","Feuilles de kafir lime","1 c. à s. de sauce de poisson","1 c. à s. de sucre de palme","Aubergines thaïes","Basilic thaï","Huile"],steps:["Faire revenir la pâte de curry dans l'huile 1 minute.","Ajouter le lait de coco et porter à frémissement.","Incorporer le poulet en lamelles. Cuire 8 minutes.","Ajouter les aubergines, citronnelle et feuilles de kafir.","Assaisonner avec sauce de poisson et sucre.","Terminer avec le basilic thaï. Servir sur du riz jasmin."]},
{id:97,emoji:"🧄",name:"Poulet rôti à l'ail confit",tags:["Français","Rapide","Sans gluten"],time:"65 min",diff:"Facile",srv:"4 pers",cal:"470 kcal",desc:"Un poulet rôti généreux avec une quarantaine de gousses d'ail confites, suaves et fondantes.",ing:["1 poulet entier","40 gousses d'ail non épluchées","150ml de vin blanc","Thym","Laurier","Huile d'olive","Beurre","Sel, poivre"],steps:["Préchauffer le four à 200°C.","Badigeonner le poulet d'huile et de beurre. Saler, poivrer.","Disposer dans un plat avec les gousses d'ail non épluchées, thym et laurier.","Verser le vin blanc.","Rôtir 1h en arrosant régulièrement.","Servir avec les gousses d'ail confites à presser directement."]},
{id:98,emoji:"🍫",name:"Mousse au chocolat",tags:["Français","Dessert","Rapide","Végétarien"],time:"20 min",diff:"Facile",srv:"6 pers",cal:"320 kcal",desc:"Une mousse au chocolat aérienne et intense, la version classique de grand-mère.",ing:["200g de chocolat noir 70%","6 œufs","1 pincée de sel","2 c. à s. de sucre","40g de beurre"],steps:["Séparer les jaunes des blancs.","Faire fondre chocolat et beurre au bain-marie. Refroidir légèrement.","Incorporer les jaunes un par un au chocolat.","Monter les blancs en neige ferme avec la pincée de sel et le sucre.","Incorporer 1/4 des blancs pour détendre, puis le reste en soulevant délicatement.","Répartir dans des verrines. Réfrigérer minimum 2 heures."]},
{id:99,emoji:"🥘",name:"Soupe minestrone",tags:["Italien","Vegan","Végétarien","Healthy"],time:"45 min",diff:"Facile",srv:"6 pers",cal:"240 kcal",desc:"Le minestrone italien généreux avec de nombreux légumes de saison, des pâtes et des haricots.",ing:["2 courgettes","2 carottes","1 branche de céleri","1 oignon","400g de haricots cannellini","400g de tomates","100g de petites pâtes","1 pomme de terre","Parmesan","Basilic","Huile d'olive"],steps:["Couper tous les légumes en petits dés.","Faire revenir oignon, carotte et céleri dans l'huile.","Ajouter courgette, pomme de terre et tomates.","Verser 1.5L d'eau ou bouillon. Porter à ébullition.","Ajouter les haricots et les pâtes. Cuire 15 minutes.","Servir avec du parmesan râpé, du basilic et un filet d'huile."]},
{id:100,emoji:"🎂",name:"Gâteau d'anniversaire chocolat",tags:["Français","Dessert","Végétarien"],time:"90 min",diff:"Moyen",srv:"10 pers",cal:"540 kcal",desc:"Un gâteau d'anniversaire au chocolat avec ganache, moelleux et impressionnant.",ing:["300g de chocolat noir","200g de beurre","6 œufs","200g de sucre","150g de farine","2 c. à c. de levure","200ml de crème liquide","Vermicelles de couleurs"],steps:["Préchauffer le four à 175°C.","Fondre 200g de chocolat et beurre. Incorporer jaunes et sucre.","Ajouter farine et levure. Monter les blancs en neige et incorporer.","Cuire dans 2 moules de 20cm pendant 25 minutes.","Ganache : chauffer la crème, verser sur 100g de chocolat. Lisser.","Superposer les génoises avec ganache, recouvrir. Décorer."]},
/* Série 101-150 : fiches ultra-rapides */
{id:101,emoji:"🍳",name:"Œufs cocotte aux épinards",tags:["Français","Végétarien","Rapide","Petit-déjeuner"],time:"15 min",diff:"Facile",srv:"2 pers",cal:"280 kcal",desc:"Des œufs cuits en cocotte sur lit d'épinards à la crème, un brunch élégant et rapide.",ing:["4 œufs","200g d'épinards frais","100ml de crème","Parmesan","Noix de muscade","Beurre","Sel, poivre"],steps:["Préchauffer le four à 180°C.","Faire fondre les épinards dans le beurre. Assaisonner avec muscade.","Répartir dans des ramequins beurrés.","Verser la crème, casser 2 œufs par ramequin.","Saupoudrer de parmesan.","Cuire 10 à 12 minutes au bain-marie."]},

/* ══════════════════════════════════════════════
   STATE
   ══════════════════════════════════════════════ */
let currentRecipe = null;
let currentFilter = '';
let deferredPrompt = null;

const getSaved = () => { try { return JSON.parse(localStorage.getItem('cdj_offline')||'[]'); } catch { return []; } };
const setSaved = a => { try { localStorage.setItem('cdj_offline', JSON.stringify(a)); } catch {} };
const isSaved  = id => getSaved().some(r => r.id === id);

/* ══════════════════════════════════════════════
   DATE
   ══════════════════════════════════════════════ */
(()=>{
  const D=['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  const M=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const d=new Date();
  document.getElementById('heroDate').textContent=`${D[d.getDay()]} ${d.getDate()} ${M[d.getMonth()]} ${d.getFullYear()}`;

  // Recette du jour basée sur la date (stable dans la journée)
  const seed = d.getFullYear()*10000 + (d.getMonth()+1)*100 + d.getDate();
  const idx  = seed % RECIPES.length;
  currentRecipe = RECIPES[idx];
  renderCard(currentRecipe);
  document.getElementById('heroCount').textContent = `${RECIPES.length} recettes • Fonctionne hors-ligne`;
})();

/* ══════════════════════════════════════════════
   NAV
   ══════════════════════════════════════════════ */
function showScreen(name, btn) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  if(btn) btn.classList.add('active');
  if(name==='saved') renderSaved();
  if(name==='explore') renderExplore();
}

/* ══════════════════════════════════════════════
   HOME
   ══════════════════════════════════════════════ */
function pickTag(el, tag) {
  document.querySelectorAll('#homeTags .tag').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  currentFilter = tag;
  document.getElementById('kwInput').value = '';
  showFiltered();
}

function filterHome() {
  document.querySelectorAll('#homeTags .tag').forEach(t=>t.classList.remove('on'));
  currentFilter = '';
  showFiltered();
}

function showFiltered() {
  const kw = document.getElementById('kwInput').value.trim().toLowerCase();
  let pool = RECIPES.filter(r => {
    const matchTag  = !currentFilter || r.tags.includes(currentFilter);
    const matchText = !kw || r.name.toLowerCase().includes(kw) ||
      r.desc.toLowerCase().includes(kw) ||
      r.ing.some(i=>i.toLowerCase().includes(kw));
    return matchTag && matchText;
  });
  if (!pool.length) {
    document.getElementById('recipeArea').innerHTML = `
      <div style="text-align:center;padding:40px 24px;color:var(--ash)">
        <div style="font-size:40px;margin-bottom:12px">🔍</div>
        <div style="font-family:var(--f-disp);font-size:20px;font-style:italic;color:var(--ink);margin-bottom:8px">Aucun résultat</div>
        <div style="font-size:14px">Essayez un autre mot-clé ou filtre.</div>
      </div>`;
    return;
  }
  const r = pool[Math.floor(Math.random() * pool.length)];
  currentRecipe = r;
  renderCard(r);
}

function shuffle() {
  const kw = document.getElementById('kwInput').value.trim().toLowerCase();
  let pool = RECIPES.filter(r => {
    const matchTag  = !currentFilter || r.tags.includes(currentFilter);
    const matchText = !kw || r.name.toLowerCase().includes(kw) ||
      r.desc.toLowerCase().includes(kw) ||
      r.ing.some(i=>i.toLowerCase().includes(kw));
    return matchTag && matchText;
  });
  if (!pool.length) { showToast('Aucune recette dans ce filtre'); return; }
  let r;
  do { r = pool[Math.floor(Math.random() * pool.length)]; } while (pool.length > 1 && r.id === currentRecipe?.id);
  currentRecipe = r;
  renderCard(r, true);
}

/* ══════════════════════════════════════════════
   RENDER CARD
   ══════════════════════════════════════════════ */
function renderCard(r, animate=true) {
  const saved = isSaved(r.id);
  const chips = [
    r.time && `<div class="chip">⏱ ${r.time}</div>`,
    r.diff && `<div class="chip">👨‍🍳 ${r.diff}</div>`,
    r.srv  && `<div class="chip">👥 ${r.srv}</div>`,
    r.cal  && `<div class="chip">🔥 ${r.cal}</div>`,
  ].filter(Boolean).join('');
  const ings  = (r.ing||[]).map(i=>`<span class="ing">${i}</span>`).join('');
  const steps = (r.steps||[]).map((s,i)=>`<div class="step-row"><div class="step-n">${i+1}</div><div class="step-t">${s}</div></div>`).join('');
  const hFill = `<svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:white;fill:white;stroke-width:2;stroke-linecap:round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`;
  const hEmpty= `<svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:white;fill:none;stroke-width:2;stroke-linecap:round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`;

  document.getElementById('recipeArea').innerHTML = `
    <div class="recipe-card${animate?' appear':''}">
      <div class="card-visual">${r.emoji||'🍽️'}<div class="card-chips">${chips}</div></div>
      <div class="card-body">
        <div class="card-name">${r.name}</div>
        <div class="card-desc">${r.desc}</div>
        <div class="sec-head">Ingrédients</div>
        <div class="ing-wrap">${ings}</div>
        <div class="sec-head">Préparation</div>
        <div class="steps-list">${steps}</div>
        <div class="card-actions">
          <button class="btn-save${saved?' saved':''}" id="mainSaveBtn" onclick="saveMain(${r.id})">
            ${saved ? hFill+' Sauvegardée' : hEmpty+' Sauvegarder'}
          </button>
          <button class="btn-other" onclick="shuffle()">
            <svg viewBox="0 0 24 24"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
            Autre
          </button>
        </div>
      </div>
    </div>`;
}

/* ══════════════════════════════════════════════
   SAVE
   ══════════════════════════════════════════════ */
function saveMain(id) {
  const r = RECIPES.find(x=>x.id===id);
  if (!r) return;
  const saved = getSaved();
  if (saved.some(s=>s.id===id)) { showToast('Déjà dans vos favoris !'); return; }
  saved.unshift(r); setSaved(saved); updateBadge();
  const btn = document.getElementById('mainSaveBtn');
  if(btn){ btn.classList.add('saved'); btn.innerHTML=`<svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:white;fill:white;stroke-width:2;stroke-linecap:round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg> Sauvegardée`; }
  showToast('Recette sauvegardée 🎉');
}

function sheetSave() {
  const id = parseInt(document.getElementById('sheetBackdrop').dataset.id);
  const r  = RECIPES.find(x=>x.id===id) || getSaved().find(x=>x.id===id);
  if (!r) return;
  const saved = getSaved();
  if (saved.some(s=>s.id===id)) { showToast('Déjà dans vos favoris !'); return; }
  saved.unshift(r); setSaved(saved); updateBadge();
  const btn = document.getElementById('sheetSaveBtn');
  btn.classList.add('saved'); btn.innerHTML = `<svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:white;fill:white;stroke-width:2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg> Sauvegardée`;
  showToast('Recette sauvegardée 🎉');
}

/* ══════════════════════════════════════════════
   EXPLORE
   ══════════════════════════════════════════════ */
let exploreFilter = '';

function pickFilter(el, tag) {
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
  exploreFilter = tag;
  renderExplore();
}

function renderExplore() {
  const kw   = (document.getElementById('exploreInput')?.value||'').trim().toLowerCase();
  const pool = RECIPES.filter(r => {
    const matchTag  = !exploreFilter || r.tags.includes(exploreFilter);
    const matchText = !kw || r.name.toLowerCase().includes(kw) ||
      r.desc.toLowerCase().includes(kw) ||
      r.ing.some(i=>i.toLowerCase().includes(kw));
    return matchTag && matchText;
  });
  document.getElementById('exploreCount').textContent = `${RECIPES.length} recettes disponibles`;
  document.getElementById('exploreCountLabel').textContent = `${pool.length} résultat${pool.length>1?'s':''}`;
  document.getElementById('exploreGrid').innerHTML = pool.map(r => {
    const saved = isSaved(r.id);
    return `
      <div class="grid-item" onclick="openSheet(${r.id})">
        <div class="grid-emoji">${r.emoji||'🍽️'}</div>
        <div class="grid-content">
          <div class="grid-name">${r.name}</div>
          <div class="grid-meta">
            ${r.time?`<span>⏱ ${r.time}</span>`:''}
            ${r.diff?`<span>👨‍🍳 ${r.diff}</span>`:''}
          </div>
          <div class="grid-tags">${r.tags.slice(0,3).map(t=>`<span class="grid-tag">${t}</span>`).join('')}</div>
        </div>
        <div class="grid-side">
          <button class="heart-btn${saved?' saved':''}" onclick="event.stopPropagation();toggleSave(${r.id},this)" aria-label="${saved?'Retirer des favoris':'Ajouter aux favoris'}">
            <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          </button>
        </div>
      </div>`;
  }).join('');
}

function toggleSave(id, btn) {
  const saved = getSaved();
  if (saved.some(s=>s.id===id)) {
    setSaved(saved.filter(s=>s.id!==id));
    btn.classList.remove('saved');
    showToast('Retiré des favoris');
  } else {
    const r = RECIPES.find(x=>x.id===id);
    if(r){ saved.unshift(r); setSaved(saved); btn.classList.add('saved'); showToast('Recette sauvegardée 🎉'); }
  }
  updateBadge();
}

/* ══════════════════════════════════════════════
   SHEET
   ══════════════════════════════════════════════ */
function openSheet(id) {
  const r = RECIPES.find(x=>x.id===id);
  if(!r) return;
  document.getElementById('sheetBackdrop').dataset.id = id;
  document.getElementById('sEmoji').textContent = r.emoji||'🍽️';
  document.getElementById('sName').textContent  = r.name;
  document.getElementById('sDesc').textContent  = r.desc;
  document.getElementById('sChips').innerHTML   = [
    r.time && `<span class="sheet-chip">⏱ ${r.time}</span>`,
    r.diff && `<span class="sheet-chip">👨‍🍳 ${r.diff}</span>`,
    r.srv  && `<span class="sheet-chip">👥 ${r.srv}</span>`,
    r.cal  && `<span class="sheet-chip">🔥 ${r.cal}</span>`,
  ].filter(Boolean).join('');
  document.getElementById('sIngs').innerHTML    = (r.ing||[]).map(x=>`<span class="ing">${x}</span>`).join('');
  document.getElementById('sSteps').innerHTML   = (r.steps||[]).map((s,n)=>`<div class="step-row"><div class="step-n">${n+1}</div><div class="step-t">${s}</div></div>`).join('');
  const btn = document.getElementById('sheetSaveBtn');
  const alreadySaved = isSaved(id);
  btn.className = 'sheet-save-btn' + (alreadySaved?' saved':'');
  btn.innerHTML = alreadySaved
    ? `<svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:white;fill:white;stroke-width:2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg> Sauvegardée`
    : `<svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:white;fill:none;stroke-width:2;stroke-linecap:round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg> Sauvegarder`;
  document.getElementById('sheetBackdrop').classList.add('open');
}
function closeSheet(){ document.getElementById('sheetBackdrop').classList.remove('open'); }
function maybeClose(e){ if(e.target===document.getElementById('sheetBackdrop')) closeSheet(); }

/* ══════════════════════════════════════════════
   SAVED LIST
   ══════════════════════════════════════════════ */
function renderSaved() {
  const saved = getSaved();
  document.getElementById('savedCount').textContent = saved.length
    ? `${saved.length} recette${saved.length>1?'s':''} sauvegardée${saved.length>1?'s':''}`
    : 'Aucune recette sauvegardée';
  const c = document.getElementById('savedContainer');
  if(!saved.length){
    c.innerHTML=`<div class="empty-state"><div class="empty-emoji">📭</div><div class="empty-title">Rien ici pour l'instant</div><p class="empty-sub">Explorez les recettes et sauvegardez vos coups de cœur !</p></div>`;
    return;
  }
  c.innerHTML='<div style="padding:16px;display:flex;flex-direction:column;gap:10px">'+saved.map((r,i)=>`
    <div class="grid-item" onclick="openSheet(${r.id})" style="border-radius:var(--r-lg)">
      <div class="grid-emoji">${r.emoji||'🍽️'}</div>
      <div class="grid-content">
        <div class="grid-name">${r.name}</div>
        <div class="grid-meta">${[r.time&&`⏱ ${r.time}`,r.diff&&`👨‍🍳 ${r.diff}`].filter(Boolean).join(' · ')}</div>
      </div>
      <div class="grid-side">
        <button class="icon-btn del" onclick="event.stopPropagation();delSaved(${i})" aria-label="Supprimer">
          <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
        </button>
      </div>
    </div>`).join('')+'</div>';
}

function delSaved(i) {
  const saved=getSaved(); const n=saved[i].name; saved.splice(i,1); setSaved(saved); updateBadge(); renderSaved(); showToast(`« ${n} » supprimée`);
}

/* ══════════════════════════════════════════════
   BADGE + TOAST
   ══════════════════════════════════════════════ */
function updateBadge(){ const n=getSaved().length,el=document.getElementById('navBadge'); el.textContent=n||''; el.classList.toggle('show',n>0); }
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2800); }

/* ══════════════════════════════════════════════
   INSTALL
   ══════════════════════════════════════════════ */
window.addEventListener('beforeinstallprompt',e=>{ e.preventDefault(); deferredPrompt=e; document.getElementById('installBanner').classList.add('visible'); });
document.getElementById('installBanner').addEventListener('click',async function(e){ if(e.target.classList.contains('ib-close')) return; if(deferredPrompt){ deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt=null; this.classList.remove('visible'); } });
function dismissInstall(e){ e.stopPropagation(); document.getElementById('installBanner').classList.remove('visible'); }

/* ══════════════════════════════════════════════
   SW
   ══════════════════════════════════════════════ */
if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});

updateBadge();
</script>
</body>
</html>
